<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #14110d;
    --ink: #f1ead8;
    --muted: rgba(241,234,216,0.55);
    --loop: #8a7b5b;
    --loop-text: #f1ead8;
    --accent: #ff6b35;
    --line-out: #ff6b35;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 70px 60px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .head { text-align: center; display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .tag {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .hook {
    font-size: 48px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1.5px;
  }
  .hook em { font-style: italic; color: var(--accent); font-weight: 800; }

  .scene { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
  .scene svg { width: 100%; height: 100%; max-height: 580px; }

  .foot { text-align: center; display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .bridge {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .reveal {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .reveal em { font-style: normal; color: var(--accent); }
  .sub {
    font-size: 19px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .node-label { font-family: "Inter", sans-serif; font-size: 17px; font-weight: 800; letter-spacing: 1px; fill: var(--loop-text); text-transform: uppercase; }
  .exit-label { font-family: "Inter", sans-serif; font-size: 20px; font-weight: 900; letter-spacing: 1.5px; fill: var(--bg); text-transform: uppercase; }
</style>
</head>
<body>
<!--
  PS-05 — CYCLE TRAP
  ===================
  A closed brown loop of repeating monthly pains. An accent arrow
  breaks the loop and exits to the right, where a single bright
  block names the system.

  REQUIRED:
  - 4 nodes on the loop, each a phase of the pain cycle in
    short labels (chase, scramble, plateau, repeat).
  - The "escape" arrow exits from one node — usually the worst
    one — and points to the system block.
  - Reveal copy names what makes it linear instead of circular.

  DO NOT:
  - Use this for first-time buyers — this template earns its
    keep when the ICP has lived the loop multiple times.
  - Add a second exit; one way out, one offer.
-->
  <div class="head">
    <div class="tag">Every quarter, the same loop</div>
    <div class="hook">Chase, scramble, plateau — <em>repeat.</em></div>
  </div>

  <div class="scene">
    <svg viewBox="0 0 980 580" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="loop-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 Z" fill="var(--loop)"/>
        </marker>
        <marker id="exit-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 Z" fill="var(--accent)"/>
        </marker>
      </defs>

      <!-- the loop — 4 arcs forming a circle, center 320,290, r 200 -->
      <g fill="none" stroke="var(--loop)" stroke-width="6" stroke-linecap="round">
        <!-- top arc, with arrow into right node -->
        <path d="M 320,90 A 200,200 0 0 1 520,290" marker-end="url(#loop-arrow)"/>
        <!-- right arc, into bottom -->
        <path d="M 520,290 A 200,200 0 0 1 320,490" marker-end="url(#loop-arrow)"/>
        <!-- bottom arc, into left -->
        <path d="M 320,490 A 200,200 0 0 1 120,290" marker-end="url(#loop-arrow)"/>
        <!-- left arc, into top (closes the loop) -->
        <path d="M 120,290 A 200,200 0 0 1 320,90" marker-end="url(#loop-arrow)"/>
      </g>

      <!-- 4 nodes -->
      <g>
        <circle cx="320" cy="90" r="58" fill="var(--loop)"/>
        <text x="320" y="86" text-anchor="middle" class="node-label">Big push</text>
        <text x="320" y="108" text-anchor="middle" class="node-label" style="opacity:0.7;">(month 1)</text>
      </g>
      <g>
        <circle cx="520" cy="290" r="58" fill="var(--loop)"/>
        <text x="520" y="286" text-anchor="middle" class="node-label">Scramble</text>
        <text x="520" y="308" text-anchor="middle" class="node-label" style="opacity:0.7;">(month 2)</text>
      </g>
      <g>
        <circle cx="320" cy="490" r="58" fill="var(--loop)"/>
        <text x="320" y="486" text-anchor="middle" class="node-label">Plateau</text>
        <text x="320" y="508" text-anchor="middle" class="node-label" style="opacity:0.7;">(month 3)</text>
      </g>
      <g>
        <circle cx="120" cy="290" r="58" fill="var(--loop)"/>
        <text x="120" y="286" text-anchor="middle" class="node-label">Cut spend</text>
        <text x="120" y="308" text-anchor="middle" class="node-label" style="opacity:0.7;">(month 4)</text>
      </g>

      <!-- exit arrow from "Scramble" -->
      <path d="M 580,290 C 660,290 720,290 770,290"
            stroke="var(--accent)" stroke-width="8" fill="none" stroke-linecap="round"
            marker-end="url(#exit-arrow)"/>
      <text x="675" y="270" text-anchor="middle" font-family="Inter,sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="var(--accent)" text-transform="uppercase">EXIT</text>

      <!-- system block -->
      <g>
        <rect x="800" y="220" width="160" height="140" rx="14" fill="var(--accent)"/>
        <text x="880" y="280" text-anchor="middle" class="exit-label">THE</text>
        <text x="880" y="308" text-anchor="middle" class="exit-label">SYSTEM</text>
        <text x="880" y="338" text-anchor="middle" class="exit-label" style="font-size:13px;letter-spacing:1px;">linear growth</text>
      </g>
    </svg>
  </div>

  <div class="foot">
    <div class="bridge">There's a way out.</div>
    <div class="reveal">An always-on system that <em>compounds month over month</em> — no Q1 reset.</div>
    <div class="sub">Performance-based · stop renting your pipeline back every quarter</div>
  </div>
</body>
</html>
