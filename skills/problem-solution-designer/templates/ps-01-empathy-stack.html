<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #f4efe6;
    --ink: #1a1a1a;
    --muted: rgba(26,26,26,0.55);
    --strike: rgba(26,26,26,0.45);
    --dark: #111111;
    --dark-ink: #f4efe6;
    --accent: #ff5a1f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
  }

  .top {
    padding: 80px 80px 40px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 28px;
  }
  .tag {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }
  .rows { display: flex; flex-direction: column; gap: 18px; }
  .row {
    display: flex;
    align-items: baseline;
    gap: 24px;
    font-family: "Times New Roman", Georgia, serif;
    font-style: italic;
    font-size: 46px;
    line-height: 1.15;
    font-weight: 500;
  }
  .row .num {
    font-family: "Inter", sans-serif;
    font-style: normal;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--muted);
    min-width: 60px;
  }
  .row .txt { flex: 1; text-decoration: line-through; text-decoration-color: var(--strike); text-decoration-thickness: 2px; }

  .bottom {
    background: var(--dark);
    color: var(--dark-ink);
    padding: 60px 80px 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    text-align: center;
  }
  .bridge {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .reveal {
    font-size: 64px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -2px;
  }
  .reveal em { font-style: normal; color: var(--accent); }
  .sub {
    font-size: 22px;
    font-weight: 700;
    color: rgba(244,239,230,0.55);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<!--
  PS-01 — EMPATHY STACK
  ======================
  Three things the buyer has already tried (and that failed),
  shown struck-through. The solution arrives as the only option
  not yet crossed off.

  REQUIRED:
  - Top zone (paper): 3 rows of "tried things," each in the ICP's
    literal voice. Strike-through is the mechanism — "been there,
    didn't work."
  - Bottom zone (dark): the SYSTEM as the un-struck answer.
  - Bridge label is one word ("Until.", "Then.", "Instead.").

  DO NOT:
  - List five tries — three is the magic number.
  - Use this when the buyer hasn't tried anything yet; this template
    earns its keep with battle-tired ICPs.
-->
  <div class="top">
    <div class="tag">You've already tried…</div>
    <div class="rows">
      <div class="row"><span class="num">01</span><span class="txt">"More ad spend." Costs went up, cases didn't.</span></div>
      <div class="row"><span class="num">02</span><span class="txt">"A new intake hire." Quit in four months.</span></div>
      <div class="row"><span class="num">03</span><span class="txt">"That other agency." Pretty dashboards, no signed cases.</span></div>
    </div>
  </div>

  <div class="bottom">
    <div class="bridge">Instead.</div>
    <div class="reveal">The complete intake system —<br><em>answered, qualified, booked.</em></div>
    <div class="sub">Performance-based · 3 PI firms onboarding this month</div>
  </div>
</body>
</html>
