<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0e1116;
    --ink: #e7e4dd;
    --muted: rgba(231,228,221,0.55);
    --domino: #e7e4dd;
    --domino-dot: #0e1116;
    --catch: #ffd24a;
    --accent: #ffd24a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 70px 60px 70px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .head { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px; }
  .tag {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .hook {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -1.5px;
    line-height: 1.05;
  }
  .hook em { font-style: italic; color: var(--accent); font-weight: 800; }

  .scene {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .scene svg { width: 100%; height: 100%; max-height: 460px; }

  .foot {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 12px;
  }
  .reveal {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .reveal em { font-style: normal; color: var(--accent); }
  .sub {
    font-size: 19px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .caption { font-size: 22px; font-weight: 800; letter-spacing: 1.5px; fill: var(--muted); font-family: "Inter", sans-serif; text-transform: uppercase; }
  .catch-label { font-weight: 900; letter-spacing: 2px; fill: var(--bg); font-family: "Inter", sans-serif; text-transform: uppercase; }
</style>
</head>
<body>
<!--
  PS-02 — DOMINO FALL
  ====================
  A cascade of problems shown as falling dominoes (all leaning
  rightward, increasing tilt). The system appears as a yellow
  "catcher" block at the end — the chain reaction stops there.

  REQUIRED:
  - Hook copy names the FIRST domino (the trigger pain).
  - The 4 falling dominoes get short pain labels under them
    (≤ 2 words each — anything longer collides).
  - The catcher (rightmost block) wears the offer name.
  - Reveal copy below names the SYSTEM, not a feature.

  DO NOT:
  - Add a 5th or 6th domino — the eye loses the rhythm past 4.
  - Make domino tilt angles inconsistent — they must increase
    monotonically (looks like falling, not random).
-->
  <div class="head">
    <div class="tag">When one thing slips…</div>
    <div class="hook">One slow lead becomes a <em>lost month.</em></div>
  </div>

  <div class="scene">
    <svg viewBox="0 0 960 440" xmlns="http://www.w3.org/2000/svg">
      <!-- ground line -->
      <line x1="20" y1="380" x2="940" y2="380" stroke="rgba(231,228,221,0.25)" stroke-width="3"/>

      <!-- Domino 1 — most tilted (almost flat right) -->
      <g transform="translate(120,380) rotate(-72)">
        <rect x="-38" y="-180" width="76" height="180" rx="8" fill="var(--domino)"/>
        <circle cx="0" cy="-135" r="7" fill="var(--domino-dot)"/>
        <circle cx="0" cy="-45" r="7" fill="var(--domino-dot)"/>
      </g>
      <text x="120" y="425" text-anchor="middle" class="caption">Slow reply</text>

      <!-- Domino 2 -->
      <g transform="translate(290,380) rotate(-55)">
        <rect x="-38" y="-180" width="76" height="180" rx="8" fill="var(--domino)"/>
        <circle cx="0" cy="-135" r="7" fill="var(--domino-dot)"/>
        <circle cx="0" cy="-45" r="7" fill="var(--domino-dot)"/>
      </g>
      <text x="290" y="425" text-anchor="middle" class="caption">Cold lead</text>

      <!-- Domino 3 -->
      <g transform="translate(465,380) rotate(-35)">
        <rect x="-38" y="-180" width="76" height="180" rx="8" fill="var(--domino)"/>
        <circle cx="0" cy="-135" r="7" fill="var(--domino-dot)"/>
        <circle cx="0" cy="-45" r="7" fill="var(--domino-dot)"/>
      </g>
      <text x="465" y="425" text-anchor="middle" class="caption">No follow-up</text>

      <!-- Domino 4 — barely tipped, leans into catcher -->
      <g transform="translate(645,380) rotate(-18)">
        <rect x="-38" y="-180" width="76" height="180" rx="8" fill="var(--domino)"/>
        <circle cx="0" cy="-135" r="7" fill="var(--domino-dot)"/>
        <circle cx="0" cy="-45" r="7" fill="var(--domino-dot)"/>
      </g>
      <text x="645" y="425" text-anchor="middle" class="caption">Lost case</text>

      <!-- Catcher block — stops the fall, rests on ground -->
      <g>
        <rect x="780" y="160" width="160" height="220" rx="14" fill="var(--catch)"/>
        <text x="860" y="240" text-anchor="middle" class="catch-label" style="font-size:26px;">THE</text>
        <text x="860" y="276" text-anchor="middle" class="catch-label" style="font-size:26px;">SYSTEM</text>
        <text x="860" y="320" text-anchor="middle" class="catch-label" style="font-size:14px;letter-spacing:1.5px;opacity:0.7;">stops the fall</text>
      </g>

      <!-- impact marks -->
      <g transform="translate(770,210)">
        <path d="M 0,0 L -22,-8 M 0,8 L -26,12 M 0,16 L -20,26" stroke="var(--catch)" stroke-width="4" stroke-linecap="round"/>
      </g>
    </svg>
  </div>

  <div class="foot">
    <div class="reveal">A system that <em>answers, qualifies and books</em> — before the next domino falls.</div>
    <div class="sub">Median first response: under 4 minutes · 24/7</div>
  </div>
</body>
</html>
