<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #04211a;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .annotation {
    color: #ecfccb;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: -0.2px;
  }
  .annotation .strong { color: #4ade80; font-weight: 800; }
  .phone {
    width: 880px;
    height: 1000px;
    background: #000;
    border-radius: 56px;
    padding: 14px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    border: 1.5px solid #1a1a1a;
  }
  .screen {
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 44px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    color: #fff;
  }
  .status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 38px 4px;
    font-size: 18px;
    font-weight: 600;
  }
  .status-right { display: flex; gap: 6px; align-items: center; }
  .signal-bars { display: inline-flex; align-items: flex-end; gap: 2px; height: 12px; }
  .signal-bars span { width: 3px; background: #fff; border-radius: 1px; }
  .signal-bars span:nth-child(1) { height: 4px; }
  .signal-bars span:nth-child(2) { height: 6px; }
  .signal-bars span:nth-child(3) { height: 9px; }
  .signal-bars span:nth-child(4) { height: 12px; }
  .battery {
    width: 26px; height: 12px; border: 1.5px solid #fff; border-radius: 3px;
    position: relative; padding: 1.5px;
  }
  .battery::after {
    content: ""; position: absolute; right: -3px; top: 3px;
    width: 2px; height: 4px; background: #fff; border-radius: 0 1px 1px 0;
  }
  .battery-fill { width: 92%; height: 100%; background: #4ade80; border-radius: 1px; }
  .header-title {
    text-align: center;
    font-size: 38px;
    font-weight: 700;
    color: #fff;
    margin-top: 16px;
    letter-spacing: -0.5px;
  }
  .header-sub {
    text-align: center;
    color: #4ade80;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .timer-section {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    position: relative;
  }
  .ring-wrap {
    position: relative;
    width: 520px;
    height: 520px;
  }
  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .digits {
    color: #fff;
    font-size: 110px;
    font-weight: 200;
    letter-spacing: -3px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .alarm-row {
    color: #9ca3af;
    font-size: 18px;
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .alarm-row .bell { font-size: 16px; }
  .alarm-row .endat { color: #fff; font-weight: 600; }
  .presets {
    padding: 20px 30px 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .preset {
    text-align: center;
    padding: 18px 6px;
    border: 1px solid #1f2937;
    border-radius: 14px;
    background: #0a0a0a;
  }
  .preset-name {
    color: #9ca3af;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .preset-time {
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .preset.cta {
    background: #052e16;
    border-color: #166534;
  }
  .preset.cta .preset-name { color: #4ade80; }
  .preset.cta .preset-time { color: #4ade80; }
  .tabs {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 10px 0;
    border-top: 1px solid #1f2937;
    font-size: 15px;
    color: #6b7280;
    font-weight: 500;
    margin-top: 10px;
  }
  .tabs .active { color: #4ade80; font-weight: 700; }
  .controls {
    display: flex;
    justify-content: space-between;
    padding: 0 60px 26px;
  }
  .ctrl {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 500;
  }
  .ctrl.cancel { background: #1c1c1e; color: #fff; border: 1px solid #2c2c2e; }
  .ctrl.start { background: #052e16; color: #4ade80; border: 1px solid #052e16; }
</style>
</head>
<body>
  <div class="annotation"><span class="strong">For SaaS founders</span> &middot; one onboarding walkthrough fits in here</div>
  <div class="phone">
    <div class="screen">
      <div class="status">
        <span>SaaS Founder</span>
        <div class="status-right">
          <div class="signal-bars"><span></span><span></span><span></span><span></span></div>
          <span style="font-size:14px;letter-spacing:-0.3px;">5G</span>
          <div class="battery"><div class="battery-fill"></div></div>
        </div>
      </div>
      <div class="header-title">Timer</div>
      <div class="header-sub">SaaS Founder &middot; onboarding teardown</div>
      <div class="timer-section">
        <div class="ring-wrap">
          <svg width="520" height="520" viewBox="0 0 520 520">
            <circle cx="260" cy="260" r="240" fill="none" stroke="#0a0a0a" stroke-width="14"/>
            <circle cx="260" cy="260" r="240" fill="none" stroke="#4ade80" stroke-width="14"
              stroke-dasharray="1206 1508" stroke-dashoffset="120"
              transform="rotate(-90 260 260)" stroke-linecap="round"/>
          </svg>
          <div class="ring-center">
            <div class="digits">29:42</div>
            <div class="alarm-row"><span class="bell">&#9788;</span>End at <span class="endat">9:41 AM</span></div>
          </div>
        </div>
      </div>
      <div class="presets">
        <div class="preset">
          <div class="preset-name">Yesterday</div>
          <div class="preset-time">2:14:00</div>
        </div>
        <div class="preset">
          <div class="preset-name">Lifetime avg</div>
          <div class="preset-time">3:48:21</div>
        </div>
        <div class="preset cta">
          <div class="preset-name">Walkthrough &rarr;</div>
          <div class="preset-time">30:00</div>
        </div>
      </div>
      <div class="tabs">
        <span>World Clock</span>
        <span>Alarm</span>
        <span>Stopwatch</span>
        <span class="active">Timer</span>
      </div>
      <div class="controls">
        <div class="ctrl cancel">Cancel</div>
        <div class="ctrl start">Pause</div>
      </div>
    </div>
  </div>
</body>
</html>
