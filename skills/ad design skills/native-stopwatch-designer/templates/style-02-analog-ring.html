<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #1f1147;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .annotation {
    color: #fff;
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 16px;
    text-align: center;
    letter-spacing: -0.2px;
  }
  .annotation .strong { color: #c4b5fd; font-weight: 800; }
  .phone {
    width: 760px;
    height: 880px;
    background: #0a0a0a;
    border-radius: 56px;
    padding: 14px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    border: 1.5px solid #1a1a1a;
  }
  .screen {
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 44px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    color: #fff;
  }
  .status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 38px 4px;
    font-size: 18px;
    font-weight: 600;
  }
  .status-right { display: flex; gap: 6px; align-items: center; }
  .signal-bars { display: inline-flex; align-items: flex-end; gap: 2px; height: 12px; }
  .signal-bars span { width: 3px; background: #fff; border-radius: 1px; }
  .signal-bars span:nth-child(1) { height: 4px; }
  .signal-bars span:nth-child(2) { height: 6px; }
  .signal-bars span:nth-child(3) { height: 9px; }
  .signal-bars span:nth-child(4) { height: 12px; }
  .battery {
    width: 26px; height: 12px; border: 1.5px solid #fff; border-radius: 3px;
    position: relative; padding: 1.5px;
  }
  .battery::after {
    content: ""; position: absolute; right: -3px; top: 3px;
    width: 2px; height: 4px; background: #fff; border-radius: 0 1px 1px 0;
  }
  .battery-fill { width: 80%; height: 100%; background: #fff; border-radius: 1px; }
  .subtitle {
    color: #c4b5fd;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-top: 22px;
  }
  .ring-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .ring {
    width: 520px;
    height: 520px;
    position: relative;
  }
  .ring svg { display: block; }
  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .digits {
    color: #fff;
    font-size: 100px;
    font-weight: 200;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .digits .ms { font-size: 50px; color: #c4b5fd; font-weight: 300; }
  .small-label {
    color: #9ca3af;
    font-size: 15px;
    margin-top: 14px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .timer-chip {
    margin: 14px auto 22px;
    padding: 14px 26px;
    background: #2e1065;
    color: #c4b5fd;
    border: 1px solid #4c1d95;
    border-radius: 999px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.2px;
    display: inline-block;
  }
  .chip-wrap { text-align: center; }
  .tabs {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 14px 0;
    border-top: 1px solid #1f2937;
    font-size: 15px;
    color: #6b7280;
    font-weight: 500;
  }
  .tabs .active { color: #c4b5fd; font-weight: 700; }
  .controls {
    display: flex;
    justify-content: space-between;
    padding: 0 50px 22px;
  }
  .ctrl {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 500;
  }
  .ctrl.lap {
    background: #1c1c1e;
    color: #fff;
    border: 1px solid #2c2c2e;
  }
  .ctrl.start {
    background: #16331f;
    color: #34d399;
    border: 1px solid #16331f;
  }
</style>
</head>
<body>
  <div class="annotation"><span class="strong">For B2B SDR teams</span> &middot; how long it takes the average rep to send the first reply</div>
  <div class="phone">
    <div class="screen">
      <div class="status">
        <span>SDR Team</span>
        <div class="status-right">
          <div class="signal-bars"><span></span><span></span><span></span><span></span></div>
          <span style="font-size:14px;letter-spacing:-0.3px;">5G</span>
          <div class="battery"><div class="battery-fill"></div></div>
        </div>
      </div>
      <div class="subtitle">Average inbound reply time</div>
      <div class="ring-wrap">
        <div class="ring">
          <svg width="520" height="520" viewBox="0 0 520 520">
            <circle cx="260" cy="260" r="240" fill="none" stroke="#1a1a1a" stroke-width="6"/>
            <circle cx="260" cy="260" r="240" fill="none" stroke="#c4b5fd" stroke-width="10"
              stroke-dasharray="1206 1508" stroke-dashoffset="0" transform="rotate(-90 260 260)" stroke-linecap="round"/>
            <g font-family="Inter" font-size="18" fill="#9ca3af" font-weight="600">
              <text x="260" y="40" text-anchor="middle">0</text>
              <text x="480" y="266" text-anchor="middle">15</text>
              <text x="260" y="496" text-anchor="middle">30</text>
              <text x="40" y="266" text-anchor="middle">45</text>
            </g>
            <line x1="260" y1="260" x2="430" y2="100" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
            <circle cx="260" cy="260" r="10" fill="#c4b5fd"/>
          </svg>
          <div class="ring-center">
            <div class="digits">19<span class="ms">:</span>42<span class="ms">.0</span></div>
            <div class="small-label">hours per inbound lead</div>
          </div>
        </div>
      </div>
      <div class="chip-wrap">
        <div class="timer-chip">&rarr; Set: 30-min response audit</div>
      </div>
      <div class="tabs">
        <span>World Clock</span>
        <span>Alarm</span>
        <span class="active">Stopwatch</span>
        <span>Timer</span>
      </div>
      <div class="controls">
        <div class="ctrl lap">Lap</div>
        <div class="ctrl start">Start</div>
      </div>
    </div>
  </div>
</body>
</html>
