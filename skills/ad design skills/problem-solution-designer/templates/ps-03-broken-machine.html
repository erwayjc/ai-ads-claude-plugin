<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #1a1d24;
    --ink: #e9e6dd;
    --muted: rgba(233,230,221,0.55);
    --broken: #555a66;
    --broken-rim: #6f7686;
    --accent: #38e3a4;
    --gear-strong: #e9e6dd;
    --spark: #ff5252;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 70px 60px 70px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .head { text-align: center; display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .tag {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .hook {
    font-size: 52px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1.5px;
  }
  .hook em { font-style: italic; color: var(--accent); font-weight: 800; }

  .scene { flex: 1; display: grid; grid-template-columns: 1fr 80px 1fr; align-items: center; gap: 6px; min-height: 0; }
  .panel { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .panel svg { width: 100%; max-height: 380px; display: block; }
  .panel-label {
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .panel-label.go { color: var(--accent); }
  .arrow { display: flex; align-items: center; justify-content: center; }
  .arrow svg { width: 70px; height: 70px; }

  .foot { text-align: center; display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .reveal {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .reveal em { font-style: normal; color: var(--accent); }
  .sub {
    font-size: 19px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .gear-cap {
    font-family: "Inter", sans-serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 1.5px;
    fill: var(--bg);
    text-transform: uppercase;
  }
  .outer-label {
    font-family: "Inter", sans-serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 2px;
    fill: var(--gear-strong);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<!--
  PS-03 — BROKEN MACHINE
  =======================
  Left: 4 mismatched gears scattered at odd angles, off-center,
  some grayed-out, with red sparks. Right: 4 aligned gears in a
  grid + 1 accent driver gear in the middle, labeled.

  REQUIRED:
  - Same gear COUNT both sides (4) — the offer is integration,
    not addition. The 5th right-side gear is the SYSTEM itself.
  - Gear labels name your actual sub-systems (intake, ads, SEO, CRM).
  - Reveal copy names the SYSTEM, not a feature.

  NOTE on the SVG:
  - Gears are drawn as direct <path> elements with explicit
    coordinates (no <symbol>/<use> indirection — that caused
    scaling bugs in the first cut).
  - Each gear is a circle + 8 teeth (rotated rectangles) + a
    dark center hub.

  DO NOT:
  - Make the left panel "too cute" — it should feel wrong,
    not decorative.
  - Add more gears on the right than left (you're aligning the
    ones they have, not adding new tools).
-->
  <div class="head">
    <div class="tag">Five tools, four logins, zero handoffs</div>
    <div class="hook">Your stack works <em>against itself.</em></div>
  </div>

  <div class="scene">
    <!-- LEFT — broken: 4 scattered gears, mismatched sizes, with sparks -->
    <div class="panel">
      <svg viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
        <!-- Gear 1: top-left, medium, broken color -->
        <g transform="translate(110,100) rotate(15)">
          <circle r="48" fill="var(--broken)"/>
          <g fill="var(--broken)">
            <rect x="-7" y="-62" width="14" height="16"/>
            <rect x="-7" y="46" width="14" height="16"/>
            <rect x="46" y="-7" width="16" height="14"/>
            <rect x="-62" y="-7" width="16" height="14"/>
            <rect x="-7" y="-62" width="14" height="16" transform="rotate(45)"/>
            <rect x="-7" y="46" width="14" height="16" transform="rotate(45)"/>
            <rect x="46" y="-7" width="16" height="14" transform="rotate(45)"/>
            <rect x="-62" y="-7" width="16" height="14" transform="rotate(45)"/>
          </g>
          <circle r="14" fill="var(--bg)"/>
        </g>

        <!-- Gear 2: top-right, larger, broken-rim color -->
        <g transform="translate(265,90) rotate(-22)">
          <circle r="58" fill="var(--broken-rim)"/>
          <g fill="var(--broken-rim)">
            <rect x="-8" y="-74" width="16" height="18"/>
            <rect x="-8" y="56" width="16" height="18"/>
            <rect x="56" y="-8" width="18" height="16"/>
            <rect x="-74" y="-8" width="18" height="16"/>
            <rect x="-8" y="-74" width="16" height="18" transform="rotate(45)"/>
            <rect x="-8" y="56" width="16" height="18" transform="rotate(45)"/>
            <rect x="56" y="-8" width="18" height="16" transform="rotate(45)"/>
            <rect x="-74" y="-8" width="18" height="16" transform="rotate(45)"/>
          </g>
          <circle r="16" fill="var(--bg)"/>
        </g>

        <!-- Gear 3: bottom-left, small -->
        <g transform="translate(90,240) rotate(40)">
          <circle r="36" fill="var(--broken-rim)"/>
          <g fill="var(--broken-rim)">
            <rect x="-6" y="-48" width="12" height="14"/>
            <rect x="-6" y="34" width="12" height="14"/>
            <rect x="34" y="-6" width="14" height="12"/>
            <rect x="-48" y="-6" width="14" height="12"/>
            <rect x="-6" y="-48" width="12" height="14" transform="rotate(45)"/>
            <rect x="-6" y="34" width="12" height="14" transform="rotate(45)"/>
            <rect x="34" y="-6" width="14" height="12" transform="rotate(45)"/>
            <rect x="-48" y="-6" width="14" height="12" transform="rotate(45)"/>
          </g>
          <circle r="11" fill="var(--bg)"/>
        </g>

        <!-- Gear 4: bottom-right, medium -->
        <g transform="translate(280,250) rotate(-12)">
          <circle r="50" fill="var(--broken)"/>
          <g fill="var(--broken)">
            <rect x="-7" y="-65" width="14" height="16"/>
            <rect x="-7" y="49" width="14" height="16"/>
            <rect x="49" y="-7" width="16" height="14"/>
            <rect x="-65" y="-7" width="16" height="14"/>
            <rect x="-7" y="-65" width="14" height="16" transform="rotate(45)"/>
            <rect x="-7" y="49" width="14" height="16" transform="rotate(45)"/>
            <rect x="49" y="-7" width="16" height="14" transform="rotate(45)"/>
            <rect x="-65" y="-7" width="16" height="14" transform="rotate(45)"/>
          </g>
          <circle r="15" fill="var(--bg)"/>
        </g>

        <!-- sparks where gears would collide -->
        <g stroke="var(--spark)" stroke-width="4" stroke-linecap="round" fill="none">
          <path d="M 178 130 L 195 115"/>
          <path d="M 185 145 L 205 148"/>
          <path d="M 175 160 L 192 175"/>
          <path d="M 180 220 L 198 215"/>
          <path d="M 175 235 L 195 240"/>
        </g>
      </svg>
      <div class="panel-label">Today</div>
    </div>

    <!-- arrow -->
    <div class="arrow">
      <svg viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
        <path d="M 10 35 L 56 35 M 44 22 L 60 35 L 44 48" stroke="var(--accent)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- RIGHT — integrated: accent driver in center + 4 outer gears in grid -->
    <div class="panel">
      <svg viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
        <!-- Center driver (accent) -->
        <g transform="translate(190,170)">
          <circle r="62" fill="var(--accent)"/>
          <g fill="var(--accent)">
            <rect x="-9" y="-80" width="18" height="20"/>
            <rect x="-9" y="60" width="18" height="20"/>
            <rect x="60" y="-9" width="20" height="18"/>
            <rect x="-80" y="-9" width="20" height="18"/>
            <rect x="-9" y="-80" width="18" height="20" transform="rotate(45)"/>
            <rect x="-9" y="60" width="18" height="20" transform="rotate(45)"/>
            <rect x="60" y="-9" width="20" height="18" transform="rotate(45)"/>
            <rect x="-80" y="-9" width="20" height="18" transform="rotate(45)"/>
          </g>
          <circle r="32" fill="var(--bg)"/>
        </g>
        <text x="190" y="166" text-anchor="middle" class="gear-cap" style="font-size:11px;letter-spacing:2px;fill:var(--accent);">THE</text>
        <text x="190" y="184" text-anchor="middle" class="gear-cap" style="font-size:13px;letter-spacing:1.5px;fill:var(--accent);">SYSTEM</text>

        <!-- 4 outer gears, smaller, same size, aligned -->
        <g transform="translate(80,80)">
          <circle r="40" fill="var(--gear-strong)"/>
          <g fill="var(--gear-strong)">
            <rect x="-6" y="-52" width="12" height="14"/>
            <rect x="-6" y="38" width="12" height="14"/>
            <rect x="38" y="-6" width="14" height="12"/>
            <rect x="-52" y="-6" width="14" height="12"/>
            <rect x="-6" y="-52" width="12" height="14" transform="rotate(45)"/>
            <rect x="-6" y="38" width="12" height="14" transform="rotate(45)"/>
            <rect x="38" y="-6" width="14" height="12" transform="rotate(45)"/>
            <rect x="-52" y="-6" width="14" height="12" transform="rotate(45)"/>
          </g>
          <circle r="12" fill="var(--bg)"/>
        </g>
        <text x="80" y="160" text-anchor="middle" class="outer-label">ADS</text>

        <g transform="translate(300,80)">
          <circle r="40" fill="var(--gear-strong)"/>
          <g fill="var(--gear-strong)">
            <rect x="-6" y="-52" width="12" height="14"/>
            <rect x="-6" y="38" width="12" height="14"/>
            <rect x="38" y="-6" width="14" height="12"/>
            <rect x="-52" y="-6" width="14" height="12"/>
            <rect x="-6" y="-52" width="12" height="14" transform="rotate(45)"/>
            <rect x="-6" y="38" width="12" height="14" transform="rotate(45)"/>
            <rect x="38" y="-6" width="14" height="12" transform="rotate(45)"/>
            <rect x="-52" y="-6" width="14" height="12" transform="rotate(45)"/>
          </g>
          <circle r="12" fill="var(--bg)"/>
        </g>
        <text x="300" y="160" text-anchor="middle" class="outer-label">INTAKE</text>

        <g transform="translate(80,260)">
          <circle r="40" fill="var(--gear-strong)"/>
          <g fill="var(--gear-strong)">
            <rect x="-6" y="-52" width="12" height="14"/>
            <rect x="-6" y="38" width="12" height="14"/>
            <rect x="38" y="-6" width="14" height="12"/>
            <rect x="-52" y="-6" width="14" height="12"/>
            <rect x="-6" y="-52" width="12" height="14" transform="rotate(45)"/>
            <rect x="-6" y="38" width="12" height="14" transform="rotate(45)"/>
            <rect x="38" y="-6" width="14" height="12" transform="rotate(45)"/>
            <rect x="-52" y="-6" width="14" height="12" transform="rotate(45)"/>
          </g>
          <circle r="12" fill="var(--bg)"/>
        </g>
        <text x="80" y="335" text-anchor="middle" class="outer-label">SEO</text>

        <g transform="translate(300,260)">
          <circle r="40" fill="var(--gear-strong)"/>
          <g fill="var(--gear-strong)">
            <rect x="-6" y="-52" width="12" height="14"/>
            <rect x="-6" y="38" width="12" height="14"/>
            <rect x="38" y="-6" width="14" height="12"/>
            <rect x="-52" y="-6" width="14" height="12"/>
            <rect x="-6" y="-52" width="12" height="14" transform="rotate(45)"/>
            <rect x="-6" y="38" width="12" height="14" transform="rotate(45)"/>
            <rect x="38" y="-6" width="14" height="12" transform="rotate(45)"/>
            <rect x="-52" y="-6" width="14" height="12" transform="rotate(45)"/>
          </g>
          <circle r="12" fill="var(--bg)"/>
        </g>
        <text x="300" y="335" text-anchor="middle" class="outer-label">CRM</text>

        <!-- thin connecting lines from center to each outer gear -->
        <g stroke="var(--accent)" stroke-width="2" opacity="0.4">
          <line x1="155" y1="135" x2="115" y2="115"/>
          <line x1="225" y1="135" x2="265" y2="115"/>
          <line x1="155" y1="205" x2="115" y2="225"/>
          <line x1="225" y1="205" x2="265" y2="225"/>
        </g>
      </svg>
      <div class="panel-label go">One system</div>
    </div>
  </div>

  <div class="foot">
    <div class="reveal">Ads, intake, SEO and CRM — <em>driven by one engine.</em></div>
    <div class="sub">One dashboard · one team · one point of accountability</div>
  </div>
</body>
</html>
