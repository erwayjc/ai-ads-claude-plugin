<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #f4f1ec;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }
  .annotation {
    color: #1f2937;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.2px;
    margin-bottom: 18px;
    text-align: center;
    max-width: 760px;
  }
  .annotation .pill {
    background: #ff7a1a;
    color: #fff;
    padding: 4px 12px;
    border-radius: 999px;
    font-weight: 700;
    margin-right: 6px;
    font-size: 22px;
    vertical-align: middle;
  }
  .phone {
    width: 760px;
    height: 880px;
    background: #000;
    border-radius: 56px;
    padding: 14px;
    box-shadow: 0 30px 70px rgba(0,0,0,0.25);
    position: relative;
  }
  .screen {
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 38px 4px;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
  }
  .status-right {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .signal-bars {
    display: inline-flex;
    align-items: flex-end;
    gap: 2px;
    height: 12px;
  }
  .signal-bars span {
    width: 3px;
    background: #fff;
    border-radius: 1px;
  }
  .signal-bars span:nth-child(1) { height: 4px; }
  .signal-bars span:nth-child(2) { height: 6px; }
  .signal-bars span:nth-child(3) { height: 9px; }
  .signal-bars span:nth-child(4) { height: 12px; }
  .battery {
    width: 26px;
    height: 12px;
    border: 1.5px solid #fff;
    border-radius: 3px;
    position: relative;
    padding: 1.5px;
  }
  .battery::after {
    content: "";
    position: absolute;
    right: -3px;
    top: 3px;
    width: 2px;
    height: 4px;
    background: #fff;
    border-radius: 0 1px 1px 0;
  }
  .battery-fill {
    width: 80%;
    height: 100%;
    background: #fff;
    border-radius: 1px;
  }
  .display-area {
    flex: 0 0 38%;
    padding: 24px 28px 8px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
    text-align: right;
  }
  .history {
    color: #8e8e93;
    font-size: 32px;
    font-weight: 300;
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .display {
    color: #fff;
    font-size: 150px;
    font-weight: 200;
    line-height: 1;
    letter-spacing: -3px;
    font-variant-numeric: tabular-nums;
  }
  .buttons {
    flex: 1;
    padding: 12px 14px 18px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 12px;
  }
  .btn {
    border-radius: 999px;
    color: #fff;
    font-size: 40px;
    font-weight: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, sans-serif;
  }
  .btn.dark { background: #333333; }
  .btn.light { background: #a5a5a5; color: #000; font-weight: 500; }
  .btn.accent { background: #f1a33c; }
  .btn.zero {
    grid-column: span 2;
    border-radius: 999px;
    justify-content: flex-start;
    padding-left: 38px;
  }
  .memo {
    color: #fff;
    text-align: center;
    margin-top: 20px;
    font-size: 22px;
    font-weight: 500;
    opacity: 0.95;
    letter-spacing: -0.2px;
  }
  .memo .arrow { color: #ff7a1a; font-weight: 700; }
</style>
</head>
<body>
  <div class="annotation"><span class="pill">For PI firms</span>Cost of one missed personal injury lead</div>
  <div class="phone">
    <div class="screen">
      <div class="status">
        <span>PI Firm</span>
        <div class="status-right">
          <div class="signal-bars"><span></span><span></span><span></span><span></span></div>
          <span style="font-size:14px;letter-spacing:-0.3px;">5G</span>
          <div class="battery"><div class="battery-fill"></div></div>
        </div>
      </div>
      <div class="display-area">
        <div class="history">1,200 &times; 4 &times; 12&nbsp;=</div>
        <div class="display">$57,600</div>
      </div>
      <div class="buttons">
        <div class="btn light">AC</div>
        <div class="btn light">+/-</div>
        <div class="btn light">%</div>
        <div class="btn accent">&divide;</div>
        <div class="btn dark">7</div>
        <div class="btn dark">8</div>
        <div class="btn dark">9</div>
        <div class="btn accent">&times;</div>
        <div class="btn dark">4</div>
        <div class="btn dark">5</div>
        <div class="btn dark">6</div>
        <div class="btn accent">-</div>
        <div class="btn dark">1</div>
        <div class="btn dark">2</div>
        <div class="btn dark">3</div>
        <div class="btn accent">+</div>
        <div class="btn dark zero">0</div>
        <div class="btn dark">.</div>
        <div class="btn accent">=</div>
      </div>
    </div>
  </div>
  <div class="memo">&times; 12 months <span class="arrow">&rarr;</span> Book the 30-min intake audit</div>
</body>
</html>
