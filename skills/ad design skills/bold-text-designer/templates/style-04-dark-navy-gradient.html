<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg-start: #0b1d3f;
    --bg-end: #1f3b6f;
    --text: #ffffff;
    --accent: #f7c948;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 90px;
    text-align: center;
  }
  .eyebrow {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 40px;
  }
  .stack {
    display: flex;
    flex-direction: column;
    gap: 32px;
    font-size: 84px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -2px;
  }
  .stack .row { padding-bottom: 26px; border-bottom: 4px solid rgba(255,255,255,0.18); }
  .stack .row:last-child { border-bottom: none; }
  .num { color: var(--accent); }
</style>
</head>
<body>
  <div class="eyebrow">Built by operators, not gurus</div>
  <div class="stack">
    <div class="row"><span class="num">$100M+</span> in client revenue</div>
    <div class="row"><span class="num">88</span> client reviews generated</div>
    <div class="row"><span class="num">12 yrs</span> in performance media</div>
  </div>
</body>
</html>
