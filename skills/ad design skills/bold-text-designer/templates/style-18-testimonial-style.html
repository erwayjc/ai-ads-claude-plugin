<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #1a1a1a;
    --card: #ffffff;
    --text: #1a1a1a;
    --accent: #ffd34d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px;
  }
  .card {
    width: 100%;
    height: 100%;
    background: var(--card);
    color: var(--text);
    border-radius: 32px;
    padding: 90px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: left;
  }
  .stars {
    color: var(--accent);
    font-size: 80px;
    letter-spacing: 8px;
    margin-bottom: 40px;
  }
  .quote {
    font-size: 70px;
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -1.5px;
  }
  .quote .em { color: var(--accent); background: #1a1a1a; padding: 0 12px; }
  .who {
    margin-top: 50px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff2d87, #ffd34d);
  }
  .meta {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.3;
  }
  .meta .sub { display: block; opacity: 0.55; font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <div class="stars">★★★★★</div>
    <div class="quote">"We booked <span class="em">17 calls</span> in the first 9 days. I've never seen anything work this fast."</div>
    <div class="who">
      <div class="avatar"></div>
      <div class="meta">Verified agency owner<span class="sub">Anonymous for compliance</span></div>
    </div>
  </div>
</body>
</html>
