<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --paper: #f1ebde;
    --paper-text: #1a1a1a;
    --paper-muted: rgba(26,26,26,0.55);
    --dark: #1a1a1a;
    --dark-text: #f1ebde;
    --accent: #ff5a1f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--dark);
    color: var(--dark-text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    position: relative;
    overflow: hidden;
  }
  .paper {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 55%;
    background: var(--paper);
    color: var(--paper-text);
    padding: 100px 80px 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 26px;
  }
  .paper .tag {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--paper-muted);
  }
  .paper .memo {
    font-family: "Times New Roman", Georgia, serif;
    font-size: 80px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -2px;
  }
  .paper .memo em {
    font-style: italic;
    color: var(--accent);
    font-weight: 800;
  }

  /* the torn edge — SVG sits at the bottom of the paper, height ~60px */
  .tear {
    position: absolute;
    top: 55%;
    left: 0; right: 0;
    width: 100%;
    height: 80px;
    transform: translateY(-40px);
    z-index: 2;
    display: block;
  }

  .dark {
    position: absolute;
    top: 55%;
    left: 0; right: 0; bottom: 0;
    padding: 90px 80px 70px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 22px;
  }
  .dark .tag {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .dark .pill {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .dark .pill em { font-style: normal; color: var(--accent); }
  .dark .sub {
    font-size: 22px;
    font-weight: 700;
    color: rgba(241,235,222,0.6);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<!--
  STYLE 32 — TORN PAGE (problem above, solution below)
  ====================================================
  Use when the ad's beat is PROBLEM → SOLUTION and you want the
  transition felt, not narrated. The jagged SVG tear is the only
  "but" — no transitional copy needed.

  REQUIRED:
  - Top (paper): the problem in the ICP's literal voice. Serif for
    memo/note feel. Accent the pain phrase.
  - Bottom (dark): the SYSTEM (not a sub-feature). Accent the bridge
    word. Footer sub-line names commercial terms.
  - The tear SVG should always sit at the seam — do not move it.

  DO NOT:
  - Use this for a single-mechanism solution. The contrast deserves
    the full offer.
  - Pretty up the tear into a clean line — the rip is the mechanism.
-->
  <div class="paper">
    <div class="tag">From: Your inbox · this morning</div>
    <div class="memo">"Lead volume is fine.<br><em>Case quality isn't.</em>"</div>
  </div>

  <!-- jagged tear -->
  <svg class="tear" viewBox="0 0 1080 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M 0,0 L 0,40 L 40,30 L 80,52 L 130,28 L 180,48 L 230,22 L 280,46 L 340,26 L 400,50 L 460,30 L 520,52 L 580,28 L 640,46 L 700,24 L 760,50 L 820,30 L 880,54 L 940,28 L 1000,48 L 1040,30 L 1080,46 L 1080,0 Z" fill="#f1ebde"/>
  </svg>

  <div class="dark">
    <div class="tag">The fix</div>
    <div class="pill">The complete marketing flywheel.<br>Ads <em>and</em> intake <em>and</em> SEO — run as one.</div>
    <div class="sub">Performance-based · 3 PI firms this month</div>
  </div>
</body>
</html>
