<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #fff5d6;
    --text: #1a1a1a;
    --muted: rgba(26,26,26,0.55);
    --strike: #d92d20;
    --accent: #d92d20;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: grid;
    grid-template-rows: 1fr auto auto;
    padding: 80px 70px;
    gap: 40px;
  }
  .top {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .wrong {
    position: relative;
    font-size: 88px;
    font-weight: 900;
    letter-spacing: -3px;
    line-height: 1.0;
    text-align: center;
    color: var(--text);
  }
  .wrong .killed {
    position: relative;
    display: inline-block;
    color: var(--muted);
  }
  /* hand-drawn strike via SVG overlay */
  .wrong .killed::after {
    content: "";
    position: absolute;
    top: 50%;
    left: -4%;
    width: 108%;
    height: 18px;
    background: var(--strike);
    transform: translateY(-50%) rotate(-2deg) skewX(-4deg);
    border-radius: 40% 60% 50% 60%;
    box-shadow: 2px 4px 0 rgba(217,45,32,0.25);
  }
  .arrow {
    text-align: center;
    font-size: 60px;
    line-height: 1;
    color: var(--accent);
    font-weight: 900;
  }
  .right {
    text-align: center;
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -1.4px;
    line-height: 1.05;
    padding: 28px 32px;
    background: var(--text);
    color: var(--bg);
    border-radius: 18px;
  }
  .right em { font-style: normal; color: var(--accent); }
  .footer {
    text-align: center;
    font-size: 20px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .footer em { font-style: normal; color: var(--accent); }
</style>
</head>
<body>
<!--
  STYLE 34 — CROSSED-OUT HEADLINE (the ad edits itself)
  =====================================================
  Use when the ad's beat is REFRAMING a broken approach. The
  strikethrough is the entire mechanism — the viewer sees the
  correction happen in real time.

  REQUIRED:
  - Top line = the broken approach in plain words. The phrase to be
    killed wears the .killed strike.
  - Bottom dark pill = the SYSTEM-level correction. Accent the bridge.
  - Arrow between is optional — a thick "→" works fine.

  DO NOT:
  - Strike out the WHOLE headline. The strikethrough must surgically
    kill the wrong phrase so the corrected one feels like the answer.
  - Use this for sub-feature corrections (e.g., "More forms → faster
    forms"). The reframe should be system-level.
-->
  <div class="top">
    <div class="wrong">More leads<br>from <span class="killed">more channels.</span></div>
  </div>

  <div class="arrow">↓</div>

  <div class="right">One flywheel that <em>compounds every month.</em></div>

  <div class="footer">The complete marketing flywheel · <em>performance-based</em></div>
</body>
</html>
