<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f3a2a;
    --card: #ffffff;
    --text: #0f3a2a;
    --accent: #2ecc71;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 70px;
  }
  .card {
    background: var(--card);
    color: var(--text);
    width: 100%;
    height: 100%;
    border-radius: 36px;
    padding: 80px 70px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
  }
  .title {
    font-size: 64px;
    font-weight: 900;
    letter-spacing: -1.5px;
    line-height: 1.05;
    margin-bottom: 50px;
  }
  .list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 32px;
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -1px;
    text-align: left;
    line-height: 1.1;
  }
  .item {
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .check {
    flex-shrink: 0;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    font-weight: 900;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="title">What clients see in week one:</div>
    <ul class="list">
      <li class="item"><span class="check">✓</span> Fresh booked calls daily</li>
      <li class="item"><span class="check">✓</span> Reviews stacking up</li>
      <li class="item"><span class="check">✓</span> Pipeline you can forecast</li>
      <li class="item"><span class="check">✓</span> Zero new hires</li>
    </ul>
  </div>
</body>
</html>
