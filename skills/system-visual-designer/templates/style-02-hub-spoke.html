<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0b1320;
    --text: #ffffff;
    --muted: rgba(255,255,255,0.55);
    --accent: #4ade80;
    --spoke: rgba(255,255,255,0.18);
    --node-bg: #131c2d;
    --node-border: rgba(255,255,255,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: radial-gradient(circle at 50% 55%, #14223a 0%, var(--bg) 70%);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 60px 50px 50px;
    position: relative;
    overflow: hidden;
  }
  .headline {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -1.8px;
    line-height: 1.0;
    text-align: center;
  }
  .headline em { font-style: normal; color: var(--accent); }
  .sub {
    margin-top: 12px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stage svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .hub {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: var(--accent);
    color: #062712;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    box-shadow:
      0 0 0 12px rgba(74,222,128,0.10),
      0 0 0 28px rgba(74,222,128,0.05),
      0 20px 50px rgba(0,0,0,0.5);
    z-index: 3;
  }
  .hub .hub-tag {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    opacity: 0.75;
  }
  .hub .hub-name {
    margin-top: 6px;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.6px;
    line-height: 1.05;
  }
  .hub .hub-outcome {
    margin-top: 10px;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.3px;
    opacity: 0.85;
  }

  .node {
    position: absolute;
    width: 165px;
    background: var(--node-bg);
    border: 1.5px solid var(--node-border);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
    box-shadow: 0 10px 24px rgba(0,0,0,0.4);
    z-index: 2;
  }
  .node .node-name {
    font-size: 17px;
    font-weight: 900;
    letter-spacing: -0.3px;
    line-height: 1.15;
  }
  .node .node-meta {
    margin-top: 4px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .n1 { left: 50%; top: 4%; transform: translateX(-50%); }
  .n2 { right: 4%; top: 22%; }
  .n3 { right: 4%; bottom: 22%; }
  .n4 { left: 50%; bottom: 4%; transform: translateX(-50%); }
  .n5 { left: 4%; bottom: 22%; }
  .n6 { left: 4%; top: 22%; }

  .footer {
    text-align: center;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.3px;
    color: var(--muted);
  }
  .footer em { font-style: normal; color: var(--accent); font-weight: 900; }
</style>
</head>
<body>
<!--
  STYLE 02 — HUB & SPOKE
  ===================================================
  Use when the ad's beat is "one system, many surfaces."
  Central glowing hub (the proprietary system, accent color) with 6
  named surfaces radiating out. Spokes are thin lines, not arrows —
  this is integration, not direction.

  REQUIRED:
  - Hub: short system name + outcome line. Accent color. Round.
  - 6 surface nodes evenly distributed around the perimeter.
  - SVG spokes from hub center to each node center.
  - All node names in ICP vocabulary.

  DO NOT:
  - Use directional arrows on the spokes — this is not a process diagram.
    For directional/causal flow, use style-06 signal-flow.
  - Add more than 6 nodes. The shape starts to read as a starburst, not
    a system.
-->
  <div>
    <div class="headline">One <em>integrated</em> system.</div>
    <div class="sub">Six surfaces · one source of truth</div>
  </div>

  <div class="stage">
    <svg viewBox="0 0 1000 700" preserveAspectRatio="none">
      <!-- spokes from center (500,350) to each node center -->
      <g stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-dasharray="4 6">
        <line x1="500" y1="350" x2="500" y2="80"/>
        <line x1="500" y1="350" x2="900" y2="190"/>
        <line x1="500" y1="350" x2="900" y2="510"/>
        <line x1="500" y1="350" x2="500" y2="620"/>
        <line x1="500" y1="350" x2="100" y2="510"/>
        <line x1="500" y1="350" x2="100" y2="190"/>
      </g>
      <!-- soft inner ring -->
      <circle cx="500" cy="350" r="180" fill="none" stroke="rgba(74,222,128,0.10)" stroke-width="1"/>
      <circle cx="500" cy="350" r="260" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </svg>

    <div class="hub">
      <div class="hub-tag">The System</div>
      <div class="hub-name">Case Lead<br>Flywheel</div>
      <div class="hub-outcome">→ Exclusive cases</div>
    </div>

    <div class="node n1">
      <div class="node-name">Paid Ads</div>
      <div class="node-meta">Surface · 01</div>
    </div>
    <div class="node n2">
      <div class="node-name">Instant Intake</div>
      <div class="node-meta">Surface · 02</div>
    </div>
    <div class="node n3">
      <div class="node-name">AI SEO</div>
      <div class="node-meta">Surface · 03</div>
    </div>
    <div class="node n4">
      <div class="node-name">Reviews</div>
      <div class="node-meta">Surface · 04</div>
    </div>
    <div class="node n5">
      <div class="node-name">Social</div>
      <div class="node-meta">Surface · 05</div>
    </div>
    <div class="node n6">
      <div class="node-name">Brand + Site</div>
      <div class="node-meta">Surface · 06</div>
    </div>
  </div>

  <div class="footer">Performance-based · <em>invitation-only</em></div>
</body>
</html>
