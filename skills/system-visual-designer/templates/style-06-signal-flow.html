<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0a0c10;
    --text: #ffffff;
    --muted: rgba(255,255,255,0.55);
    --accent: #a78bfa;
    --node-bg: #141822;
    --node-border: rgba(255,255,255,0.10);
    --wire: rgba(167,139,250,0.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 70px 50px 50px;
    position: relative;
    overflow: hidden;
  }
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 30px 30px;
    pointer-events: none;
  }
  .headline {
    position: relative;
    z-index: 2;
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -1.8px;
    line-height: 1.0;
    text-align: center;
  }
  .headline em { font-style: normal; color: var(--accent); }
  .sub {
    position: relative;
    z-index: 2;
    margin-top: 12px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  .stage {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
  }
  .stage svg.wires {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .node {
    position: absolute;
    background: var(--node-bg);
    border: 1.5px solid var(--node-border);
    border-radius: 12px;
    padding: 12px 14px;
    min-width: 165px;
    text-align: center;
    box-shadow: 0 10px 24px rgba(0,0,0,0.4);
    z-index: 2;
  }
  .node .ntag {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .node .nname {
    margin-top: 4px;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: -0.3px;
    line-height: 1.1;
  }

  .node.in {
    border-style: dashed;
    border-color: rgba(255,255,255,0.25);
  }
  .node.transform {
    border-color: var(--accent);
    background: linear-gradient(180deg, rgba(167,139,250,0.10), rgba(167,139,250,0.02));
  }
  .node.transform .ntag { color: var(--accent); }
  .node.out {
    background: var(--accent);
    color: #1a0d3e;
    border-color: rgba(0,0,0,0.18);
    box-shadow: 0 0 0 10px rgba(167,139,250,0.10), 0 10px 24px rgba(0,0,0,0.4);
  }
  .node.out .ntag { color: rgba(26,13,62,0.65); }
  .node.out .nname { font-size: 22px; }

  /* positions on a 1000×680 SVG canvas — node centers below */
  .in-1   { left: 3%;   top: 12%; }
  .in-2   { left: 3%;   top: 48%; }
  .in-3   { left: 3%;   top: 84%; transform: translateY(-100%); }
  .t-1    { left: 50%;  top: 22%; transform: translateX(-50%); }
  .t-2    { left: 50%;  top: 50%; transform: translateX(-50%); }
  .t-3    { left: 50%;  top: 78%; transform: translateX(-50%); }
  .out-1  { right: 3%;  top: 50%; transform: translateY(-50%); }

  .footer {
    position: relative;
    z-index: 2;
    text-align: center;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.3px;
    color: var(--muted);
  }
  .footer em { font-style: normal; color: var(--accent); font-weight: 900; }
</style>
</head>
<body>
<!--
  STYLE 06 — SIGNAL FLOW
  ===================================================
  Use when the ad's beat is "here's how A becomes B."
  A schematic showing how named inputs flow through named transforms
  and converge into one output. Unlike the bold-text style 46
  (input → engine → output), this style shows MULTIPLE inputs and
  MULTIPLE transforms converging — proves the system handles
  heterogeneous signals, not just one stream.

  REQUIRED:
  - 3 input nodes (left, dashed border = "given").
  - 3 transform nodes (middle, accent border = "ours, proprietary").
  - 1 output node (right, accent fill = "the outcome").
  - SVG wires with arrowheads connecting inputs → transforms → output.
  - Use monospace tags on each node (IN·01, TX·01, OUT) to reinforce
    the schematic feel.

  DO NOT:
  - Cross too many wires — keep the routing legible. If you need more
    than 8 connections, you're showing too much; simplify.
  - Add labels on the wires themselves — node labels are enough.
-->
  <div class="grid-bg"></div>

  <div>
    <div class="headline">Inputs converge. <em>Cases out.</em></div>
    <div class="sub">Signal · Transform · Outcome</div>
  </div>

  <div class="stage">
    <svg class="wires" viewBox="0 0 1000 680" preserveAspectRatio="none">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="var(--wire)"/>
        </marker>
        <marker id="arrout" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
        </marker>
      </defs>
      <g fill="none" stroke="var(--wire)" stroke-width="2" stroke-linecap="round" marker-end="url(#arr)">
        <!-- inputs (left edge ~ x=170) to transforms (middle ~ x=500) -->
        <path d="M 175 110 C 320 110, 360 180, 500 180"/>
        <path d="M 175 340 C 320 340, 360 340, 500 340"/>
        <path d="M 175 570 C 320 570, 360 510, 500 510"/>
        <!-- cross-links between transforms -->
        <path d="M 500 180 C 460 240, 460 280, 500 340" stroke-dasharray="3 4"/>
        <path d="M 500 340 C 460 400, 460 440, 500 510" stroke-dasharray="3 4"/>
      </g>
      <!-- transforms (~ x=600) to output (~ x=820) -->
      <g fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" marker-end="url(#arrout)">
        <path d="M 600 180 C 720 180, 740 320, 815 340"/>
        <path d="M 600 340 L 815 340"/>
        <path d="M 600 510 C 720 510, 740 380, 815 340"/>
      </g>
    </svg>

    <div class="node in in-1">
      <div class="ntag">IN · 01</div>
      <div class="nname">Local searches</div>
    </div>
    <div class="node in in-2">
      <div class="ntag">IN · 02</div>
      <div class="nname">Paid clicks</div>
    </div>
    <div class="node in in-3">
      <div class="ntag">IN · 03</div>
      <div class="nname">Referrals</div>
    </div>

    <div class="node transform t-1">
      <div class="ntag">TX · 01</div>
      <div class="nname">Capture</div>
    </div>
    <div class="node transform t-2">
      <div class="ntag">TX · 02</div>
      <div class="nname">Qualify</div>
    </div>
    <div class="node transform t-3">
      <div class="ntag">TX · 03</div>
      <div class="nname">Route</div>
    </div>

    <div class="node out out-1">
      <div class="ntag">OUT</div>
      <div class="nname">Exclusive<br>case files</div>
    </div>
  </div>

  <div class="footer">One system · <em>three inputs, one outcome</em></div>
</body>
</html>
