<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f1216;
    --text: #ffffff;
    --muted: rgba(255,255,255,0.55);
    --accent: #f97316;
    --pipe: #1c2128;
    --pipe-border: rgba(255,255,255,0.10);
    --window-bg: #0a0c10;
    --window-border: rgba(255,255,255,0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 70px 50px 50px;
    position: relative;
    overflow: hidden;
  }
  .headline {
    font-size: 58px;
    font-weight: 900;
    letter-spacing: -1.8px;
    line-height: 1.0;
    text-align: center;
  }
  .headline em { font-style: normal; color: var(--accent); }
  .sub {
    margin-top: 12px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    position: relative;
  }

  /* the pipeline */
  .pipe-wrap {
    position: relative;
    width: 100%;
    padding: 0 10px;
  }
  .pipe {
    position: relative;
    height: 140px;
    background: linear-gradient(180deg, #232a32 0%, var(--pipe) 50%, #11151a 100%);
    border: 1.5px solid var(--pipe-border);
    border-radius: 22px;
    display: grid;
    grid-template-columns: 60px 1fr 1fr 1fr 1fr 60px;
    align-items: center;
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.06),
      inset 0 -2px 0 rgba(0,0,0,0.4),
      0 20px 40px rgba(0,0,0,0.4);
  }
  .pipe::before {
    content: "INPUT";
    position: absolute;
    left: -32px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    color: var(--muted);
  }
  .pipe::after {
    content: "OUTPUT";
    position: absolute;
    right: -42px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .cap-left, .cap-right {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cap-left {
    background: linear-gradient(90deg, rgba(255,255,255,0.06), transparent);
    border-right: 1px dashed rgba(255,255,255,0.15);
  }
  .cap-right {
    background: linear-gradient(270deg, rgba(249,115,22,0.18), transparent);
    border-left: 1px dashed rgba(249,115,22,0.5);
  }
  .cap-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--muted);
  }
  .cap-right .cap-dot { background: var(--accent); box-shadow: 0 0 0 6px rgba(249,115,22,0.18); }

  .window {
    height: 100px;
    margin: 0 6px;
    background: var(--window-bg);
    border: 1.5px solid var(--window-border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8px;
    position: relative;
  }
  .window .stage-num {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #1a0c03;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 8px;
  }
  .window .stage-name {
    font-size: 17px;
    font-weight: 900;
    letter-spacing: -0.3px;
    line-height: 1.1;
  }
  .window .stage-do {
    margin-top: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
    color: var(--muted);
    line-height: 1.2;
  }

  /* below pipe: telemetry row */
  .telemetry {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    padding: 0 70px;
  }
  .metric {
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 8px;
    padding: 14px 10px;
    text-align: center;
  }
  .metric .v {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.8px;
    color: var(--accent);
  }
  .metric .l {
    margin-top: 4px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .footer {
    text-align: center;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.3px;
    color: var(--muted);
  }
  .footer em { font-style: normal; color: var(--accent); font-weight: 900; }
</style>
</head>
<body>
<!--
  STYLE 03 — PIPELINE CUTAWAY
  ===================================================
  Use when the ad's beat is "we know what happens at every stage."
  A horizontal pipe rendered as if cut open — you can see through 4
  cutaway windows into each stage of the system. Below the pipe sits a
  telemetry row showing measurable outputs at each stage.

  REQUIRED:
  - 4 stage windows inside the pipe. Each has a stage number badge,
    a name, and a 2–4 word descriptor.
  - INPUT label on the left cap, OUTPUT label on the right cap (accent).
  - Telemetry row below with 4 measurable values (the system is
    instrumented — proves it's a real operation).

  DO NOT:
  - Add more than 4 stages — the cutaway windows get cramped.
  - Use this when the system is cyclical — use the flywheel
    (bold-text style 22) for loops.
-->
  <div>
    <div class="headline">Every stage <em>instrumented.</em></div>
    <div class="sub">From click to closed file</div>
  </div>

  <div class="stage">
    <div class="pipe-wrap">
      <div class="pipe">
        <div class="cap-left"><div class="cap-dot"></div></div>
        <div class="window">
          <div class="stage-num">01</div>
          <div class="stage-name">Ad served</div>
          <div class="stage-do">Targeted impression</div>
        </div>
        <div class="window">
          <div class="stage-num">02</div>
          <div class="stage-name">Intake</div>
          <div class="stage-do">90-sec response</div>
        </div>
        <div class="window">
          <div class="stage-num">03</div>
          <div class="stage-name">Qualify</div>
          <div class="stage-do">Case-fit screen</div>
        </div>
        <div class="window">
          <div class="stage-num">04</div>
          <div class="stage-name">Booked</div>
          <div class="stage-do">Hand-off to firm</div>
        </div>
        <div class="cap-right"><div class="cap-dot"></div></div>
      </div>
    </div>

    <div class="telemetry">
      <div class="metric"><div class="v">100%</div><div class="l">Tracked</div></div>
      <div class="metric"><div class="v">&lt;90s</div><div class="l">Response</div></div>
      <div class="metric"><div class="v">25+</div><div class="l">Cases/mo</div></div>
      <div class="metric"><div class="v">1:1</div><div class="l">Exclusive</div></div>
    </div>
  </div>

  <div class="footer">Reported weekly · <em>performance-based</em></div>
</body>
</html>
