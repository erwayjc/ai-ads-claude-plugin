<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --left-bg: #1a1a1a;
    --left-text: #ffffff;
    --right-bg: #ffd34d;
    --right-text: #1a1a1a;
    --divider: #ff2d87;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    position: relative;
  }
  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 100px 70px;
    text-align: center;
  }
  .left {
    background: var(--left-bg);
    color: var(--left-text);
  }
  .right {
    background: var(--right-bg);
    color: var(--right-text);
  }
  .label {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 36px;
  }
  .copy {
    font-size: 84px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -2px;
  }
  .divider {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 16px;
    background: var(--divider);
    transform: translateX(-50%);
  }
</style>
</head>
<body>
  <div class="panel left">
    <div class="label">Before</div>
    <div class="copy">Chasing<br>lead lists.</div>
  </div>
  <div class="panel right">
    <div class="label">After</div>
    <div class="copy">Calendar<br>full of fit.</div>
  </div>
  <div class="divider"></div>
</body>
</html>
