<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f1419;
    --text: #ffffff;
    --muted: rgba(255,255,255,0.55);
    --bad: #ff5252;
    --good: #36e0a4;
    --rule: rgba(255,255,255,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "JetBrains Mono", "Courier New", monospace;
    display: grid;
    grid-template-rows: auto 1fr auto 1fr auto;
    gap: 22px;
    padding: 70px 60px;
  }
  .headline {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 50px;
    font-weight: 900;
    letter-spacing: -1.6px;
    line-height: 1.05;
    text-align: center;
  }
  .headline em { font-style: normal; color: var(--bad); }

  .row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-align: center;
    flex-wrap: nowrap;
  }
  .row.bad  { color: var(--text); }
  .row.good { color: var(--text); }
  .term {
    background: rgba(255,255,255,0.06);
    padding: 12px 16px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .row.good .term { background: rgba(54,224,164,0.12); }
  .op {
    font-size: 36px;
    font-weight: 900;
    opacity: 0.7;
  }
  .eq {
    font-size: 48px;
    font-weight: 900;
    color: var(--bad);
    position: relative;
    padding: 0 4px;
  }
  .eq.good { color: var(--good); }
  .eq.bad::after {
    content: "";
    position: absolute;
    top: 50%; left: -10%;
    width: 120%;
    height: 5px;
    background: var(--bad);
    transform: translateY(-50%) rotate(-18deg);
  }
  .result {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: -1px;
    white-space: nowrap;
  }
  .row.bad  .result { color: var(--bad); }
  .row.good .result { color: var(--good); }

  .divider {
    text-align: center;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .divider .ne {
    color: var(--bad);
    font-size: 30px;
    vertical-align: middle;
    margin: 0 14px;
  }

  .footer {
    text-align: center;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--muted);
  }
  .footer em { font-style: normal; color: var(--good); font-weight: 900; }
</style>
</head>
<body>
<!--
  STYLE 35 — THE MATH DOESN'T WORK (equation flip)
  ================================================
  Use when the ad's beat is "the current spend isn't producing the
  outcome you need." Arithmetic is harder to argue with than
  adjectives.

  REQUIRED:
  - Top equation = the buyer's CURRENT spend stack with the disappointing
    result. The "=" is struck through.
  - Bottom equation = the SYSTEM with its outcome. Clean "=" in accent.
  - Headline names the math problem in plain words.

  DO NOT:
  - Make up numbers. If you don't know the buyer's actual stack costs,
    use a different style. Wrong math destroys credibility.
  - Use percentages or ratios — the pain is in raw dollars and case counts.
-->
  <div class="headline">The math isn't <em>mathing.</em></div>

  <div class="row bad">
    <span class="term">$8K ads</span>
    <span class="op">+</span>
    <span class="term">$4K SEO</span>
    <span class="op">+</span>
    <span class="term">$3K intake</span>
    <span class="eq bad">=</span>
    <span class="result">11 cases</span>
  </div>

  <div class="divider"><span class="ne">≠</span>the answer<span class="ne">≠</span></div>

  <div class="row good">
    <span class="term">One flywheel</span>
    <span class="eq good">=</span>
    <span class="result">25+ exclusive cases / mo</span>
  </div>

  <div class="footer">The complete marketing flywheel · <em>performance-based</em></div>
</body>
</html>
