<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #f4ede2;
    --text: #1a1a1a;
    --accent: #ff2d87;
    --accent-text: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px;
    text-align: center;
  }
  .headline {
    font-size: 124px;
    font-weight: 900;
    line-height: 1.08;
    letter-spacing: -3px;
  }
  .pill {
    display: inline-block;
    background: var(--accent);
    color: var(--accent-text);
    padding: 0 30px 14px;
    margin-top: 16px;
    border-radius: 22px;
    line-height: 1.0;
  }
</style>
</head>
<body>
  <div class="headline">
    The system runs<br>
    <span class="pill">on your own clients</span><br>
    before you ever pay.
  </div>
</body>
</html>
