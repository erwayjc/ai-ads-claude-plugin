<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #f4ede2;
    --text: #1a1a1a;
    --muted: rgba(26,26,26,0.55);
    --accent: #ff5a1f;
    --line: rgba(26,26,26,0.35);
    --box: #ffffff;
    --box-border: rgba(26,26,26,0.18);
    --you: #1a1a1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto 1fr auto;
    gap: 18px;
    padding: 60px 60px 50px;
  }
  .headline {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -1.6px;
    line-height: 1.04;
    text-align: center;
  }
  .headline em { font-style: normal; color: var(--accent); }

  .stage {
    position: relative;
    background: rgba(0,0,0,0.03);
    border-radius: 18px;
    padding: 22px;
  }
  .stage .tag {
    position: absolute;
    top: 14px; left: 18px;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .stage svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .divider {
    text-align: center;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .divider .rule {
    display: inline-block;
    width: 100px;
    height: 3px;
    background: var(--accent);
    vertical-align: middle;
    margin: 0 16px;
  }

  .footer {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--muted);
    line-height: 1.3;
  }
  .footer em { font-style: normal; color: var(--accent); font-weight: 900; }
  .footer .strong {
    color: var(--text);
    font-weight: 900;
    display: block;
    font-size: 26px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<!--
  STYLE 26 — ORG CHART COLLAPSE (vendor sprawl → one box)
  =======================================================
  Use when the ad's beat is: the SYSTEM is the solution and the pain
  is COMPLEXITY / no accountability. Top stage = tangled chart of
  vendors pointing at a stressed "YOU". Bottom stage = one clean box
  with one clean line to "YOU".

  REQUIRED:
  - Top chart: 6 vendor boxes with messy crossing lines into YOU.
  - Bottom chart: ONE box labeled with the system name + ONE line to YOU.
  - Headline must name the complexity (vendors / invoices / accountability),
    not a sub-feature.
  - Footer reveal: system + commercial terms.

  DO NOT:
  - Tidy the top chart. The mess IS the message.
  - Replace the single bottom box with a multi-component diagram —
    that re-introduces the complexity the ad is selling against.
-->
  <div class="headline">Six vendors. Six invoices.<br><em>Zero accountability.</em></div>

  <!-- TOP: vendor sprawl -->
  <div class="stage">
    <span class="tag">Today</span>
    <svg viewBox="0 0 960 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <!-- 6 vendor boxes across the top -->
      <g font-family="Inter, sans-serif" font-weight="800" font-size="18" fill="#1a1a1a">
        <g transform="translate(20,30)">
          <rect width="140" height="56" rx="8" fill="#ffffff" stroke="rgba(26,26,26,0.18)" stroke-width="2"/>
          <text x="70" y="34" text-anchor="middle">Ad Agency</text>
        </g>
        <g transform="translate(180,30)">
          <rect width="140" height="56" rx="8" fill="#ffffff" stroke="rgba(26,26,26,0.18)" stroke-width="2"/>
          <text x="70" y="34" text-anchor="middle">SEO Firm</text>
        </g>
        <g transform="translate(340,30)">
          <rect width="140" height="56" rx="8" fill="#ffffff" stroke="rgba(26,26,26,0.18)" stroke-width="2"/>
          <text x="70" y="34" text-anchor="middle">Intake VA</text>
        </g>
        <g transform="translate(500,30)">
          <rect width="140" height="56" rx="8" fill="#ffffff" stroke="rgba(26,26,26,0.18)" stroke-width="2"/>
          <text x="70" y="34" text-anchor="middle">Web Dev</text>
        </g>
        <g transform="translate(660,30)">
          <rect width="140" height="56" rx="8" fill="#ffffff" stroke="rgba(26,26,26,0.18)" stroke-width="2"/>
          <text x="70" y="34" text-anchor="middle">Review Tool</text>
        </g>
        <g transform="translate(800,30)">
          <rect width="140" height="56" rx="8" fill="#ffffff" stroke="rgba(26,26,26,0.18)" stroke-width="2"/>
          <text x="70" y="34" text-anchor="middle">Branding</text>
        </g>
      </g>

      <!-- tangled crossing lines into YOU -->
      <g stroke="rgba(26,26,26,0.45)" stroke-width="2" fill="none">
        <path d="M 90 86 C 200 180, 700 180, 480 240"/>
        <path d="M 250 86 C 400 200, 100 220, 480 240"/>
        <path d="M 410 86 C 600 160, 200 260, 480 240"/>
        <path d="M 570 86 C 300 200, 800 220, 480 240"/>
        <path d="M 730 86 C 850 200, 200 260, 480 240"/>
        <path d="M 870 86 C 700 220, 250 240, 480 240"/>
      </g>

      <!-- stressed YOU -->
      <g transform="translate(390,235)">
        <rect width="180" height="60" rx="10" fill="#1a1a1a"/>
        <text x="90" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="22" fill="#f4ede2" letter-spacing="3">YOU</text>
      </g>
    </svg>
  </div>

  <div class="divider"><span class="rule"></span>vs<span class="rule"></span></div>

  <!-- BOTTOM: one system -->
  <div class="stage">
    <span class="tag">With the flywheel</span>
    <svg viewBox="0 0 960 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <!-- single system box -->
      <g transform="translate(280,40)">
        <rect width="400" height="90" rx="14" fill="#ff5a1f"/>
        <text x="200" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="26" fill="#ffffff">The Marketing Flywheel</text>
        <text x="200" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="14" letter-spacing="3" fill="#ffffff" opacity="0.9">ADS · INTAKE · BRANDING · SEO · REVIEWS</text>
      </g>

      <!-- one clean line -->
      <line x1="480" y1="130" x2="480" y2="230" stroke="#ff5a1f" stroke-width="5"/>
      <polygon points="480,250 470,230 490,230" fill="#ff5a1f"/>

      <!-- calm YOU -->
      <g transform="translate(390,250)">
        <rect width="180" height="56" rx="10" fill="#1a1a1a"/>
        <text x="90" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="22" fill="#f4ede2" letter-spacing="3">YOU</text>
      </g>
    </svg>
  </div>

  <div class="footer">
    <span class="strong">One system. One invoice. One number.</span>
    The complete marketing flywheel · <em>performance-based</em>
  </div>
</body>
</html>
