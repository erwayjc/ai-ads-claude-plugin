<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #f4ede2;
    --text: #1a1a1a;
    --muted: rgba(26,26,26,0.55);
    --accent: #b91c1c;
    --seal-ink: #b91c1c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 70px;
    text-align: center;
  }
  .headline {
    font-size: 60px;
    font-weight: 900;
    letter-spacing: -1.8px;
    line-height: 1.0;
  }
  .headline em { font-style: normal; color: var(--accent); }
  .stage {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .seal {
    width: 580px;
    height: 580px;
    transform: rotate(-8deg);
  }
  .footer {
    font-size: 24px;
    font-weight: 800;
    color: var(--muted);
    line-height: 1.3;
  }
  .footer em { font-style: normal; color: var(--accent); font-weight: 900; }
  .footer .line {
    color: var(--text);
    font-weight: 900;
    font-size: 30px;
    display: block;
    margin-bottom: 6px;
  }
</style>
</head>
<body>
<!--
  STYLE 28 — RISK REVERSAL STAMP
  ==============================
  Use when the ad's beat is the GUARANTEE itself. Pure objection killer.
  The wax-seal stamp IS the visual; the headline names what's guaranteed
  in the buyer's literal language.

  REQUIRED:
  - Headline = the guarantee in plain words (no "we promise" hedging).
  - Stamp = circular SVG seal with the guarantee phrase in CAPS.
  - Footer = the offer + commercial terms in one line.

  DO NOT:
  - Add testimonials or proof bars beside the seal. The seal is the proof.
  - Soften the headline ("up to", "as much as"). Risk reversal must be flat.
-->
  <div class="headline">If you don't get 25 cases,<br><em>you don't pay.</em></div>

  <div class="stage">
    <svg class="seal" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="topArc" d="M 90 300 A 210 210 0 0 1 510 300" fill="none"/>
        <path id="bottomArc" d="M 90 320 A 210 210 0 0 0 510 320" fill="none"/>
      </defs>

      <!-- outer ring -->
      <circle cx="300" cy="300" r="270" fill="none" stroke="#b91c1c" stroke-width="6"/>
      <circle cx="300" cy="300" r="248" fill="none" stroke="#b91c1c" stroke-width="2"/>
      <!-- inner ring -->
      <circle cx="300" cy="300" r="180" fill="#b91c1c"/>
      <circle cx="300" cy="300" r="168" fill="none" stroke="#f4ede2" stroke-width="3"/>

      <!-- arc text -->
      <text font-family="Inter, sans-serif" font-weight="900" font-size="30" letter-spacing="7" fill="#b91c1c">
        <textPath href="#topArc" startOffset="50%" text-anchor="middle">PERFORMANCE GUARANTEE</textPath>
      </text>
      <text font-family="Inter, sans-serif" font-weight="900" font-size="22" letter-spacing="9" fill="#b91c1c">
        <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">★  WRITTEN  ·  SIGNED  ·  BINDING  ★</textPath>
      </text>

      <!-- center stamp text -->
      <text x="300" y="270" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#f4ede2" letter-spacing="-1">25+ CASES</text>
      <text x="300" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="28" fill="#f4ede2" letter-spacing="3">OR YOU PAY</text>
      <text x="300" y="354" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="40" fill="#ffd23f" letter-spacing="6">NOTHING</text>

      <!-- decorative stars -->
      <g fill="#b91c1c">
        <circle cx="60" cy="300" r="10"/>
        <circle cx="540" cy="300" r="10"/>
      </g>
    </svg>
  </div>

  <div class="footer">
    <span class="line">The complete marketing flywheel.</span>
    Performance-based · 3 firms this quarter · <em>signed contract</em>
  </div>
</body>
</html>
