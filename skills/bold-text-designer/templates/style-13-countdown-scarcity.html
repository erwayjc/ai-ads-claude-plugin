<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #ff2d32;
    --text: #ffffff;
    --accent: #ffd34d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    text-align: center;
  }
  .eyebrow {
    font-size: 38px;
    font-weight: 900;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0.9;
  }
  .number {
    font-size: 620px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -24px;
    color: var(--accent);
  }
  .label {
    font-size: 68px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1.5px;
    margin-top: 30px;
  }
</style>
</head>
<body>
  <div class="eyebrow">Closing this week</div>
  <div class="number">7</div>
  <div class="label">spots left for our<br>March cohort</div>
</body>
</html>
