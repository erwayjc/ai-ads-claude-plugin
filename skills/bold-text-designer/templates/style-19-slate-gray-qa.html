<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #475569;
    --text: #ffffff;
    --accent: #fde047;
    --rule: rgba(255,255,255,0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 100px 90px;
  }
  .block {
    margin-bottom: 60px;
  }
  .block:last-child { margin-bottom: 0; }
  .label {
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 20px;
  }
  .q {
    font-size: 80px;
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -1.5px;
    border-bottom: 3px solid var(--rule);
    padding-bottom: 50px;
  }
  .a {
    font-size: 88px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -2px;
    color: var(--accent);
    padding-top: 50px;
  }
</style>
</head>
<body>
  <div class="block">
    <div class="label">Q</div>
    <div class="q">What if you could see results before paying a dime?</div>
  </div>
  <div class="block">
    <div class="label">A</div>
    <div class="a">You'd build agencies that compound.</div>
  </div>
</body>
</html>
