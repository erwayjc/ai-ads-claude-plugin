<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #f4ede2;
    --text: #1a1a1a;
    --bad: #b8b8b0;
    --good: #ff2d87;
    --rule: rgba(0,0,0,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 100px 80px;
  }
  .title {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -1.5px;
    line-height: 1.05;
    text-align: center;
    margin-bottom: 60px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 38px;
    font-weight: 700;
  }
  th, td {
    padding: 28px 20px;
    border-bottom: 2px solid var(--rule);
    text-align: left;
  }
  th {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
  }
  th:last-child { color: var(--good); opacity: 1; }
  .bad { color: var(--bad); text-decoration: line-through; }
  .good { color: var(--good); }
  tr:last-child td { border-bottom: none; }
</style>
</head>
<body>
  <div class="title">The old way vs. the system</div>
  <table>
    <tr>
      <th>What</th>
      <th>Old way</th>
      <th>The system</th>
    </tr>
    <tr>
      <td>Lead source</td>
      <td class="bad">Cold lists</td>
      <td class="good">Inbound only</td>
    </tr>
    <tr>
      <td>Setup time</td>
      <td class="bad">3 weeks</td>
      <td class="good">48 hours</td>
    </tr>
    <tr>
      <td>Per call cost</td>
      <td class="bad">$340</td>
      <td class="good">$48</td>
    </tr>
    <tr>
      <td>Risk</td>
      <td class="bad">Yours</td>
      <td class="good">Ours</td>
    </tr>
  </table>
</body>
</html>
