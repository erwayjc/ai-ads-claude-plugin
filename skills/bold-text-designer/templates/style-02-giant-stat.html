<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #fff5d6;
    --text: #1a1a1a;
    --accent: #ff2d87;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    text-align: center;
  }
  .number {
    font-size: 560px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -20px;
    color: var(--accent);
  }
  .label {
    font-size: 64px;
    font-weight: 800;
    line-height: 1.1;
    margin-top: 40px;
    letter-spacing: -1px;
  }
</style>
</head>
<body>
  <div class="number">88</div>
  <div class="label">5-star reviews generated<br>for our clients</div>
</body>
</html>
