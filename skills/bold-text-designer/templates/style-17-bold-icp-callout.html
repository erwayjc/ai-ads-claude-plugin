<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #fafaf7;
    --text: #1a1a1a;
    --bar: #ff2d87;
    --bar-text: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
  }
  .bar {
    background: var(--bar);
    color: var(--bar-text);
    padding: 50px 60px;
    font-size: 52px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }
  .main {
    flex: 1;
    padding: 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
  }
  .headline {
    font-size: 130px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -3px;
  }
  .subhead {
    font-size: 42px;
    font-weight: 600;
    line-height: 1.3;
    margin-top: 50px;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="bar">Attention: PI trial lawyers</div>
  <div class="main">
    <div class="headline">Your firm is<br>missing 6-figure<br>cases monthly.</div>
    <div class="subhead">We can show you exactly where the leaks are — in one 15-minute call.</div>
  </div>
</body>
</html>
