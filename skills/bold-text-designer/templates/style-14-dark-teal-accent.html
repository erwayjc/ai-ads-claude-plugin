<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0a2e2e;
    --text: #e8f5f2;
    --accent: #2dd4bf;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 130px;
    text-align: center;
  }
  .dot {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: var(--accent);
    margin-bottom: 60px;
  }
  .headline {
    font-size: 140px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -3.5px;
  }
  .headline .em { color: var(--accent); }
</style>
</head>
<body>
  <div class="dot"></div>
  <div class="headline">One client.<br>One <span class="em">free</span> test.<br>Then you decide.</div>
</body>
</html>
