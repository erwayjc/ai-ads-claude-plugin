<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #f4ede2;
    --text: #1a1a1a;
    --stripe: #ff2d87;
    --stripe-text: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    position: relative;
    overflow: hidden;
  }
  .stripe {
    position: absolute;
    top: 0; left: 0;
    width: 1500px;
    height: 220px;
    background: var(--stripe);
    color: var(--stripe-text);
    transform: rotate(-12deg) translate(-100px, 280px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 100px;
    text-align: center;
  }
  .headline {
    font-size: 110px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -2.5px;
  }
  .sub {
    font-size: 36px;
    font-weight: 600;
    line-height: 1.3;
    margin-top: 40px;
    opacity: 0.75;
  }
</style>
</head>
<body>
  <div class="stripe">Proof of Concept</div>
  <div class="content">
    <div class="headline">See the system run<br>on your clients<br>first.</div>
    <div class="sub">If it doesn't work, you don't pay. Simple as that.</div>
  </div>
</body>
</html>
