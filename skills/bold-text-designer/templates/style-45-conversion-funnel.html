<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #fef7ec;
    --text: #1a1a1a;
    --muted: rgba(26,26,26,0.55);
    --accent: #ff5a1f;
    --tier-1: #1a1a1a;
    --tier-2: #2b2b2b;
    --tier-3: #3a3a3a;
    --tier-4: #ff5a1f;
    --tier-text: #fef7ec;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 70px 70px 60px;
  }
  .headline {
    font-size: 60px;
    font-weight: 900;
    letter-spacing: -1.8px;
    line-height: 1.05;
    text-align: center;
  }
  .headline em { font-style: normal; color: var(--accent); }
  .sub {
    margin-top: 14px;
    font-size: 22px;
    font-weight: 700;
    color: var(--muted);
    text-align: center;
  }

  .stage {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 220px;
    align-items: center;
    gap: 30px;
  }
  .funnel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    justify-content: center;
    height: 100%;
  }
  .tier {
    color: var(--tier-text);
    padding: 22px 24px;
    border-radius: 10px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.10);
  }
  .tier .label {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.4px;
    flex: 1;
    text-align: left;
  }
  .tier .count {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: -1.2px;
    line-height: 1;
    white-space: nowrap;
  }
  .t1 { width: 100%;  background: var(--tier-1); }
  .t2 { width: 84%;   background: var(--tier-2); }
  .t3 { width: 64%;   background: var(--tier-3); }
  .t4 { width: 44%;   background: var(--tier-4); }
  .t4 .label, .t4 .count { color: #fff; }

  .meta {
    display: flex;
    flex-direction: column;
    gap: 18px;
    justify-content: center;
  }
  .drop {
    background: #fff;
    border: 2px solid rgba(26,26,26,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: left;
  }
  .drop .pct {
    font-size: 30px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--accent);
    line-height: 1;
  }
  .drop .desc {
    margin-top: 6px;
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    line-height: 1.3;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .footer {
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    color: var(--muted);
  }
  .footer em { font-style: normal; color: var(--accent); font-weight: 900; }
</style>
</head>
<body>
<!--
  STYLE 45 — CONVERSION FUNNEL (drop-off beat)
  ============================================
  Use when the ad's beat is "here is the conversion arithmetic — we move
  the buyer from a wide top-of-funnel to the narrow outcome." Tapered
  tiers + numeric counts make the math visible.

  REQUIRED:
  - Exactly 4 tiers. Top = raw input (impressions/leads). Bottom = the
    outcome the buyer cares about. Accent only the bottom tier.
  - Counts on every tier — the funnel is a math claim. If you can't put
    a number on a tier, use a different style.
  - Right rail shows the *system's* conversion rate at each step. Plain
    fact, not a brag.
  - Headline names the throughput, not the mechanism ("25 cases from 1,200
    clicks" beats "we have a funnel").

  DO NOT:
  - Show the buyer's bad current funnel — that's style 35 (math doesn't
    work). This style shows what the SYSTEM produces.
  - Add tier 5. Past 4, the bottom tier shrinks below readability.
-->
  <div>
    <div class="headline">From 1,200 clicks<br>to <em>25 signed cases.</em></div>
    <div class="sub">Same funnel. Every month. No spreadsheet gymnastics.</div>
  </div>

  <div class="stage">
    <div class="funnel">
      <div class="tier t1">
        <span class="label">Targeted clicks</span>
        <span class="count">1,200</span>
      </div>
      <div class="tier t2">
        <span class="label">Form fills</span>
        <span class="count">180</span>
      </div>
      <div class="tier t3">
        <span class="label">Qualified calls</span>
        <span class="count">62</span>
      </div>
      <div class="tier t4">
        <span class="label">Signed cases</span>
        <span class="count">25</span>
      </div>
    </div>

    <div class="meta">
      <div class="drop">
        <div class="pct">15%</div>
        <div class="desc">Click → form</div>
      </div>
      <div class="drop">
        <div class="pct">34%</div>
        <div class="desc">Form → qualified</div>
      </div>
      <div class="drop">
        <div class="pct">40%</div>
        <div class="desc">Qualified → signed</div>
      </div>
    </div>
  </div>

  <div class="footer">The complete marketing flywheel · <em>performance-based</em></div>
</body>
</html>
