<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #fafaf7;
    --card-bg: #fafaf7;
    --text: #1a1a1a;
    --accent: #ff2d87;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
  }
  .card {
    width: 100%;
    height: 100%;
    border: 8px solid var(--accent);
    border-radius: 28px;
    background: var(--card-bg);
    padding: 90px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
  }
  .eyebrow {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 40px;
  }
  .headline {
    font-size: 110px;
    font-weight: 900;
    line-height: 1.04;
    letter-spacing: -2.5px;
  }
  .subhead {
    font-size: 36px;
    font-weight: 600;
    line-height: 1.3;
    margin-top: 40px;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">For agency owners</div>
    <div class="headline">See it run on<br>YOUR clients first.</div>
    <div class="subhead">No retainer. No commitment. Watch the system book calls before you decide.</div>
  </div>
</body>
</html>
