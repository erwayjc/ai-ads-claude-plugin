<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #f7f5f0;
    --paper-border: rgba(26,26,26,0.12);
    --text: #1a1a1a;
    --muted: rgba(26,26,26,0.55);
    --accent: #b91c1c;
    --rx: #2d7a4f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 60px;
  }
  .chart {
    width: 100%;
    height: 100%;
    background: #ffffff;
    border: 2px solid var(--paper-border);
    border-radius: 12px;
    padding: 50px 56px;
    display: grid;
    grid-template-rows: auto 1fr auto 1fr auto;
    gap: 22px;
    position: relative;
  }
  .chart::before {
    content: "PATIENT CHART · CONFIDENTIAL";
    position: absolute;
    top: 18px;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--muted);
  }
  .header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    border-bottom: 2px solid var(--paper-border);
    padding-bottom: 18px;
    margin-top: 14px;
  }
  .header .name {
    font-family: "Times New Roman", Georgia, serif;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header .meta {
    text-align: right;
    font-size: 14px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1.5;
  }

  .section {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
  }
  .label {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .label .pill {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    padding: 4px 12px;
    border-radius: 4px;
    margin-right: 10px;
    letter-spacing: 3px;
  }
  .label.rx .pill { background: var(--rx); }

  .body {
    font-family: "Times New Roman", Georgia, serif;
    font-size: 44px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.5px;
  }
  .body em {
    font-style: italic;
    color: var(--accent);
    font-weight: 800;
  }
  .body.rx em { color: var(--rx); }

  .rule {
    height: 2px;
    background: var(--paper-border);
  }

  .signature {
    display: flex;
    align-items: end;
    justify-content: space-between;
    padding-top: 14px;
    border-top: 2px solid var(--paper-border);
  }
  .signature .sig {
    font-family: "Brush Script MT", cursive;
    font-size: 38px;
    color: var(--rx);
    line-height: 1;
  }
  .signature .stamp {
    text-align: right;
    font-size: 14px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1.6;
  }
  .signature .stamp em { font-style: normal; color: var(--rx); }
</style>
</head>
<body>
<!--
  STYLE 33 — DIAGNOSIS → PRESCRIPTION (medical chart)
  ===================================================
  Use when the ad's beat is PROBLEM → SOLUTION and you want clinical,
  asymmetric authority. Reads like a doctor's note — credible, dry,
  not salesy.

  REQUIRED:
  - DIAGNOSIS = the problem in plain language. Accent the pain word.
  - PRESCRIPTION = the SYSTEM (not a sub-feature). Accent the bridge.
  - Signature line carries the commercial terms in pseudo-cursive.
  - Keep both .body fields short — single sentence each.

  DO NOT:
  - Use real doctor names or claim medical credentials. The format is
    a metaphor; specifics turn it into fraud.
-->
  <div class="chart">
    <div class="header">
      <div class="name">Re: Your firm's growth</div>
      <div class="meta">
        Date: 05.16.2026<br>
        Chart #: PI-2026-Q2
      </div>
    </div>

    <div class="section">
      <div class="label"><span class="pill">Dx</span>Diagnosis</div>
      <div class="body">"Lead volume is fine.<br><em>Case quality isn't.</em>"</div>
    </div>

    <div class="rule"></div>

    <div class="section">
      <div class="label rx"><span class="pill">Rx</span>Prescription</div>
      <div class="body rx">The complete marketing flywheel — <em>run as one system.</em></div>
    </div>

    <div class="signature">
      <div class="sig">— Performance-based</div>
      <div class="stamp">
        3 PI firms · this quarter<br>
        <em>Signed contract · binding</em>
      </div>
    </div>
  </div>
</body>
</html>
