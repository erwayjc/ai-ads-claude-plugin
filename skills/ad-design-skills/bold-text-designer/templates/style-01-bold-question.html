<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0a0a0a;
    --text: #ffffff;
    --accent: #ff2d87;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px;
    text-align: center;
  }
  .question {
    font-size: 130px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -3px;
  }
  .accent {
    position: relative;
    color: var(--text);
    display: inline-block;
  }
  .accent::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 8px;
    height: 18px;
    background: var(--accent);
    z-index: -1;
  }
</style>
</head>
<body>
  <div class="question">
    Why are your <span class="accent">clients</span><br>
    still asking for <span class="accent">more leads</span>?
  </div>
</body>
</html>
