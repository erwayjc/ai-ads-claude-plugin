<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0a0a0a;
    --text: #ffffff;
    --accent: #d4b483;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Playfair Display", "Times New Roman", serif;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 90px 100px;
  }
  .top, .bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: "Inter", sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    opacity: 0.55;
  }
  .top .rule, .bottom .rule {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.25);
    margin: 0 24px;
  }
  .main {
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .headline {
    font-size: 150px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -3.5px;
  }
  .headline .em {
    color: var(--accent);
    font-style: italic;
  }
  .sub {
    font-family: "Inter", sans-serif;
    font-size: 36px;
    font-weight: 500;
    line-height: 1.3;
    margin-top: 40px;
    opacity: 0.8;
  }
</style>
</head>
<body>
  <div class="top"><span>VOL. 01</span><div class="rule"></div><span>FOR OPERATORS</span></div>
  <div class="main">
    <div class="headline">The end of<br><span class="em">cold lead</span> lists.</div>
    <div class="sub">A new operating model for agencies who refuse to be lead-list janitors.</div>
  </div>
  <div class="bottom"><span>EST. 2024</span><div class="rule"></div><span>READ MORE →</span></div>
</body>
</html>
