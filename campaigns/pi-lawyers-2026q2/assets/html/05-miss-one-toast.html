<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f1d3a;
    --card: #ffffff;
    --text: #0f1d3a;
    --accent: #b8001f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
  }
  .card {
    background: var(--card);
    color: var(--text);
    width: 100%;
    height: 100%;
    border-radius: 36px;
    padding: 70px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
  }
  .title {
    font-size: 92px;
    font-weight: 900;
    letter-spacing: -2.5px;
    line-height: 0.98;
    margin-bottom: 50px;
  }
  .title .em { color: var(--accent); }
  .list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 22px;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    text-align: left;
    line-height: 1.1;
    max-width: 720px;
    margin: 0 auto;
  }
  .item {
    display: flex;
    align-items: center;
    gap: 26px;
  }
  .check {
    flex-shrink: 0;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 900;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="title">Miss one and<br>you're <span class="em">toast.</span></div>
    <ul class="list">
      <li class="item"><span class="check">✓</span> Paid lead gen</li>
      <li class="item"><span class="check">✓</span> Speed-to-lead intake</li>
      <li class="item"><span class="check">✓</span> AI SEO + Google rankings</li>
      <li class="item"><span class="check">✓</span> Review management</li>
      <li class="item"><span class="check">✓</span> Content + branding</li>
    </ul>
  </div>
</body>
</html>
