<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0a0a0a;
    --text: #ffffff;
    --accent: #ff3b30;
    --dim: #2a2a2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    text-align: center;
  }
  .stopwatch {
    width: 260px;
    height: 260px;
    margin-bottom: 28px;
  }
  .eyebrow {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 14px;
    color: var(--accent);
  }
  .number {
    font-size: 480px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -20px;
    color: var(--accent);
  }
  .number .unit {
    font-size: 200px;
    letter-spacing: -8px;
  }
  .label {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1.5px;
    margin-top: 28px;
    max-width: 880px;
  }
</style>
</head>
<body>
  <svg class="stopwatch" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- crown/stem -->
    <rect x="92" y="14" width="16" height="20" rx="3" fill="#ffffff"/>
    <!-- side buttons -->
    <rect x="32" y="34" width="14" height="10" rx="2" transform="rotate(-45 39 39)" fill="#ffffff"/>
    <!-- outer bezel -->
    <circle cx="100" cy="112" r="78" fill="none" stroke="#ffffff" stroke-width="6"/>
    <!-- tick marks at 12, 3, 6, 9 -->
    <rect x="98" y="38" width="4" height="14" fill="#ffffff"/>
    <rect x="160" y="110" width="14" height="4" fill="#ffffff"/>
    <rect x="98" y="172" width="4" height="14" fill="#ffffff"/>
    <rect x="26" y="110" width="14" height="4" fill="#ffffff"/>
    <!-- 5-minute arc swept in accent (12 -> 1 o'clock position, ~30deg) -->
    <path d="M 100 38 A 74 74 0 0 1 163 78 L 100 112 Z" fill="#ff3b30" opacity="0.85"/>
    <!-- hand pointing to 5 (1 o'clock) -->
    <line x1="100" y1="112" x2="148" y2="74" stroke="#ff3b30" stroke-width="6" stroke-linecap="round"/>
    <!-- center pin -->
    <circle cx="100" cy="112" r="8" fill="#ffffff"/>
    <circle cx="100" cy="112" r="3" fill="#0a0a0a"/>
  </svg>
  <div class="eyebrow">Speed-to-lead</div>
  <div class="number">5<span class="unit">MIN</span></div>
  <div class="label">After that, your lead<br>called the firm on TV.</div>
</body>
</html>
