<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&display=swap');
:root {
    --bg: #f5f3ee;
    --text: #1a1a1a;
    --bar: #e63946;
    --bar-text: #ffffff;
    --accent: #e63946;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Playfair Display", Georgia, serif;
    display: flex;
    flex-direction: column;
  }
  .bar {
    background: var(--bar);
    color: var(--bar-text);
    padding: 46px 60px;
    font-size: 33px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }
  .main {
    flex: 1;
    padding: 90px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
  }
  .headline {
    font-size: 99px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -4px;
  }
  .headline .em { color: var(--accent); }
  .subhead {
    font-size: 29px;
    font-weight: 700;
    line-height: 1.3;
    margin-top: 56px;
    opacity: 0.72;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>
  <div class="bar">For: PI Lawyers</div>
  <div class="main">
    <div class="headline">We Only Work With PI Firms That Can Handle<br><span class="em">25+ New Case Leads</span><br>Per Month</div>
    <div class="subhead">By invitation only. Performance basis only.</div>
  </div>


</body></html>
