<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg-start: #c2185b;
    --bg-end: #0a0a0a;
    --text: #ffffff;
    --accent: #ffd34d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(155deg, var(--bg-start) 0%, var(--bg-end) 78%);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 90px 80px;
    text-align: center;
  }
  .eyebrow {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 50px;
  }
  .headline {
    font-size: 124px;
    font-weight: 900;
    line-height: 0.96;
    letter-spacing: -3px;
    text-transform: uppercase;
  }
  .headline .em { color: var(--accent); }
  .sub {
    font-size: 38px;
    font-weight: 700;
    line-height: 1.3;
    margin-top: 54px;
    opacity: 0.85;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>
  <div class="eyebrow">For Local PI Firms</div>
  <div class="headline">Private equity<br>is buying every<br>PI firm in <span class="em">your city.</span></div>
  <div class="sub">What's your move?</div>
</body>
</html>
