<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #fff5d6;
    --text: #1a1a1a;
    --accent: #d92d20;
    --dim: rgba(26,26,26,0.25);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    text-align: center;
  }
  .eyebrow {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 22px;
    opacity: 0.55;
  }
  .number {
    font-size: 380px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -14px;
    color: var(--accent);
  }
  .chart {
    width: 720px;
    height: 200px;
    margin-top: 30px;
  }
  .label {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1.5px;
    margin-top: 36px;
    max-width: 900px;
  }
  .label em {
    font-style: normal;
    color: var(--accent);
  }
</style>
</head>
<body>
  <div class="eyebrow">Cost per signed PI case</div>
  <div class="number">$847</div>
  <svg class="chart" viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg">
    <!-- baseline axis -->
    <line x1="20" y1="180" x2="700" y2="180" stroke="rgba(26,26,26,0.18)" stroke-width="3"/>
    <!-- trend line: 2022, 2023, 2024, 2025, 2026 -->
    <polyline points="60,150 220,130 380,90 540,55 680,18"
              fill="none" stroke="#d92d20" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- dots -->
    <circle cx="60"  cy="150" r="10" fill="#d92d20"/>
    <circle cx="220" cy="130" r="10" fill="#d92d20"/>
    <circle cx="380" cy="90"  r="10" fill="#d92d20"/>
    <circle cx="540" cy="55"  r="10" fill="#d92d20"/>
    <!-- final flared point -->
    <circle cx="680" cy="18" r="22" fill="#d92d20"/>
    <circle cx="680" cy="18" r="11" fill="#fff5d6"/>
    <!-- year ticks -->
    <text x="60"  y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="rgba(26,26,26,0.55)">'22</text>
    <text x="220" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="rgba(26,26,26,0.55)">'23</text>
    <text x="380" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="rgba(26,26,26,0.55)">'24</text>
    <text x="540" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="rgba(26,26,26,0.55)">'25</text>
    <text x="680" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#d92d20">'26</text>
  </svg>
  <div class="label">And it's still climbing.<br><em>What's yours?</em></div>
</body>
</html>
