<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0a0a0a;
    --text: #ffffff;
    --accent: #d4b483;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Playfair Display", "Times New Roman", serif;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 90px 100px;
  }
  .top, .bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: "Inter", sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    opacity: 0.55;
  }
  .top .rule, .bottom .rule {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.25);
    margin: 0 24px;
  }
  .main {
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .headline {
    font-size: 116px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -3px;
  }
  .headline .em {
    color: var(--accent);
    font-style: italic;
  }
  .sub {
    font-family: "Inter", sans-serif;
    font-size: 32px;
    font-weight: 600;
    line-height: 1.35;
    margin-top: 44px;
    opacity: 0.78;
  }
</style>
</head>
<body>
  <div class="top"><span>FOR PI FIRMS</span><div class="rule"></div><span>READ CLOSELY</span></div>
  <div class="main">
    <div class="headline">The national firms<br>aren't <span class="em">out-lawyering</span> you.<br>They're out-marketing you.</div>
    <div class="sub">PE-backed firms have endless cash. You have one shot to compete.</div>
  </div>
  <div class="bottom"><span>PI FLYWHEEL</span><div class="rule"></div><span>APPLY →</span></div>
</body>
</html>
