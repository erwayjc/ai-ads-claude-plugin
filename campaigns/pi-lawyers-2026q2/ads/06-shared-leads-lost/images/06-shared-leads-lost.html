<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #1a1a1a;
    --text: #f5f0e6;
    --accent: #ffd34d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px;
    text-align: center;
  }
  .before {
    font-size: 92px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    opacity: 0.55;
    text-decoration: line-through;
    text-decoration-color: var(--accent);
    text-decoration-thickness: 8px;
  }
  .divider {
    width: 120px;
    height: 10px;
    background: var(--accent);
    margin: 56px 0;
    border-radius: 5px;
  }
  .after {
    font-size: 126px;
    font-weight: 900;
    line-height: 0.98;
    letter-spacing: -3px;
  }
  .after .hi { color: var(--accent); }
</style>
</head>
<body>
  <div class="before">Buying shared leads<br>in 2026</div>
  <div class="divider"></div>
  <div class="after">You've already<br><span class="hi">lost.</span></div>
</body>
</html>
