<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #1e1b4b;          /* indigo */
    --text: #f1f5f9;        /* light slate */
    --muted: rgba(241,245,249,0.55);
    --filled: #f1f5f9;      /* filled = signed clients (light on indigo) */
    --open: #fde047;        /* lemon accent for open slots */
    --accent: #fde047;      /* lemon accent */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 50px 60px 50px;
    text-align: center;
  }
  .top { display: flex; flex-direction: column; align-items: center; }
  .headline {
    font-size: 124px;
    font-weight: 900;
    letter-spacing: -4px;
    line-height: 0.92;
  }
  .headline em { font-style: normal; color: var(--accent); }
  .sub {
    font-size: 22px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 22px;
  }
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    margin-top: 56px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 24px;
    width: 980px;
  }
  .footer-wrap {
    margin-top: 56px;
  }
  .slot {
    aspect-ratio: 1 / 1;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    letter-spacing: -1px;
  }
  .filled {
    background: var(--filled);
    color: var(--bg);
  }
  .filled::before {
    content: "✓";
    font-size: 76px;
    line-height: 1;
  }
  .open {
    background: transparent;
    border: 5px dashed var(--accent);
    color: var(--accent);
    font-size: 80px;
  }
  .open::before { content: ""; }
  .legend {
    display: flex;
    gap: 44px;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text);
  }
  .legend .dot {
    display: inline-block;
    width: 22px; height: 22px;
    border-radius: 6px;
    margin-right: 10px;
    vertical-align: middle;
  }
  .legend .dot.f { background: var(--filled); }
  .legend .dot.o { background: transparent; border: 3px dashed var(--accent); }
  .footer {
    font-size: 36px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.25;
    letter-spacing: -0.5px;
  }
  .footer em { font-style: normal; color: var(--accent); }
  .footer .meta {
    display: block;
    font-size: 19px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 14px;
  }
</style>
</head>
<body>
  <div class="top">
    <div class="headline">3 spots.<br><em>This month.</em></div>
    <div class="sub">May cohort · PI law firms</div>
  </div>

  <div class="stage">
    <div class="grid">
      <div class="slot filled"></div>
      <div class="slot filled"></div>
      <div class="slot filled"></div>
      <div class="slot filled"></div>
      <div class="slot filled"></div>
      <div class="slot filled"></div>
      <div class="slot filled"></div>
      <div class="slot open"></div>
      <div class="slot open"></div>
      <div class="slot open"></div>
    </div>
    <div class="legend">
      <span><span class="dot f"></span>Signed</span>
      <span><span class="dot o"></span>Open</span>
    </div>
  </div>

  <div class="footer footer-wrap">
    Performance-based. <em>Invitation only.</em>
    <span class="meta">25+ referrals/month capacity · Apply for an invite</span>
  </div>
</body>
</html>
