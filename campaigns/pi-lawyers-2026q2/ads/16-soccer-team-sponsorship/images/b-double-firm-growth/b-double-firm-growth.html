<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0a0a0a;
    --text: #ffffff;
    --accent: #ff2d87;
    --muted: #a8a8a8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 50px 55px;
    text-align: center;
  }
  .eyebrow {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 30px;
  }
  .question {
    font-size: 132px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -4px;
    margin-bottom: 42px;
  }
  .accent {
    position: relative;
    color: var(--text);
    display: inline-block;
    white-space: nowrap;
  }
  .accent::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 8px;
    height: 24px;
    background: var(--accent);
    z-index: -1;
  }
  .answer {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -1px;
    color: var(--text);
    margin-bottom: 36px;
  }
  .answer .pink {
    color: var(--accent);
  }
  .divider {
    width: 110px;
    height: 5px;
    background: var(--accent);
    margin: 0 auto 28px;
    border-radius: 3px;
  }
  .footer {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    line-height: 1.3;
  }
</style>
</head>
<body>
  <div class="eyebrow">PI Trial Lawyers</div>

  <div class="question">
    What would<br>
    actually <span class="accent">double</span><br>
    your firm's<br>
    growth?
  </div>

  <div class="answer">
    Not sponsoring your<br>
    kid's soccer team.<br>
    <span class="pink">Predictable inbound referrals</span> can.
  </div>

  <div class="divider"></div>

  <div class="footer">
    Performance-Based<br>
    Invitation Only
  </div>
</body>
</html>
