<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg-start: #050b1f;
    --bg-end: #0f2247;
    --text: #eaf0ff;
    --muted: rgba(234, 240, 255, 0.62);
    --accent: #5fa8ff;
    --rule: rgba(95, 168, 255, 0.22);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 36px 64px;
    text-align: center;
  }
  .eyebrow {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .stack {
    display: flex;
    flex-direction: column;
    gap: 18px;
    width: 100%;
  }
  .row {
    padding: 22px 0;
    border-bottom: 3px solid var(--rule);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .row:last-child { border-bottom: none; }
  .num {
    font-size: 172px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -6px;
    color: var(--accent);
  }
  .label {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1.1;
  }
  .closer {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .closer .lead {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1.15;
    color: var(--text);
  }
  .closer .sub {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--accent);
  }
</style>
</head>
<body>
  <div class="eyebrow">PI Lawyers — Operator to Operator</div>

  <div class="stack">
    <div class="row">
      <div class="num">12</div>
      <div class="label">years in this business</div>
    </div>
    <div class="row">
      <div class="num">300+</div>
      <div class="label">PI clients served</div>
    </div>
    <div class="row">
      <div class="num">1</div>
      <div class="label">performance-based offer</div>
    </div>
  </div>

  <div class="closer">
    <div class="lead">You only pay for referrals that meet your criteria.</div>
    <div class="sub">Invitation only</div>
  </div>
</body>
</html>
