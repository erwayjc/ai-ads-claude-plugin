<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0e2a1f;
    --bg-2: #14392a;
    --text: #f4f1e8;
    --muted: rgba(244,241,232,0.55);
    --accent: #c6f24e;
    --spoke: rgba(244,241,232,0.22);
    --node-bg: #14392a;
    --node-border: rgba(244,241,232,0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: radial-gradient(circle at 50% 55%, var(--bg-2) 0%, var(--bg) 70%);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 50px 40px 40px;
    position: relative;
    overflow: hidden;
  }
  .headline {
    font-size: 68px;
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1.0;
    text-align: center;
  }
  .headline em { font-style: normal; color: var(--accent); }
  .sub {
    margin-top: 14px;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 3.2px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 820px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stage svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .hub {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 340px;
    height: 340px;
    border-radius: 50%;
    background: var(--accent);
    color: #0e2a1f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 22px;
    box-shadow:
      0 0 0 14px rgba(198,242,78,0.10),
      0 0 0 32px rgba(198,242,78,0.05),
      0 22px 60px rgba(0,0,0,0.55);
    z-index: 3;
  }
  .hub .hub-tag {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2.8px;
    text-transform: uppercase;
    opacity: 0.75;
  }
  .hub .hub-name {
    margin-top: 8px;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -0.8px;
    line-height: 1.02;
  }
  .hub .hub-rule {
    margin-top: 14px;
    width: 60px;
    height: 2px;
    background: rgba(14,42,31,0.4);
  }
  .hub .hub-outcome {
    margin-top: 14px;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.4px;
    opacity: 0.9;
  }

  .node {
    position: absolute;
    width: 210px;
    background: var(--node-bg);
    border: 1.5px solid var(--node-border);
    border-radius: 14px;
    padding: 18px 14px;
    text-align: center;
    box-shadow: 0 10px 24px rgba(0,0,0,0.4);
    z-index: 2;
  }
  .node .node-name {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.3px;
    line-height: 1.15;
  }
  .node .node-meta {
    margin-top: 6px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .n1 { left: 50%; top: 0;  transform: translateX(-50%); }
  .n2 { right: 0;  top: 22%; }
  .n3 { right: 0;  bottom: 22%; }
  .n4 { left: 50%; bottom: 0; transform: translateX(-50%); }
  .n5 { left: 0;   bottom: 22%; }
  .n6 { left: 0;   top: 22%; }

  .footer {
    text-align: center;
    font-size: 19px;
    font-weight: 800;
    letter-spacing: 0.4px;
    color: var(--muted);
    padding-top: 10px;
  }
  .footer em { font-style: normal; color: var(--accent); font-weight: 900; }
</style>
</head>
<body>
  <div>
    <div class="headline">Six channels. <em>One engine.</em></div>
    <div class="sub">A flywheel, not a stack of vendors</div>
  </div>

  <div class="stage">
    <svg viewBox="0 0 1000 820" preserveAspectRatio="none">
      <g stroke="rgba(244,241,232,0.22)" stroke-width="1.5" stroke-dasharray="4 6">
        <line x1="500" y1="410" x2="500" y2="42"/>
        <line x1="500" y1="410" x2="895" y2="222"/>
        <line x1="500" y1="410" x2="895" y2="598"/>
        <line x1="500" y1="410" x2="500" y2="778"/>
        <line x1="500" y1="410" x2="105" y2="598"/>
        <line x1="500" y1="410" x2="105" y2="222"/>
      </g>
      <circle cx="500" cy="410" r="230" fill="none" stroke="rgba(198,242,78,0.12)" stroke-width="1"/>
      <circle cx="500" cy="410" r="340" fill="none" stroke="rgba(244,241,232,0.07)" stroke-width="1"/>
    </svg>

    <div class="hub">
      <div class="hub-tag">The Proprietary System</div>
      <div class="hub-name">The<br>Flywheel</div>
      <div class="hub-rule"></div>
      <div class="hub-outcome">Exclusive referrals</div>
    </div>

    <div class="node n1">
      <div class="node-name">Paid Ads</div>
      <div class="node-meta">Channel · 01</div>
    </div>
    <div class="node n2">
      <div class="node-name">AI SEO</div>
      <div class="node-meta">Channel · 02</div>
    </div>
    <div class="node n3">
      <div class="node-name">Reviews</div>
      <div class="node-meta">Channel · 03</div>
    </div>
    <div class="node n4">
      <div class="node-name">Intake</div>
      <div class="node-meta">Channel · 04</div>
    </div>
    <div class="node n5">
      <div class="node-name">Brand / Social</div>
      <div class="node-meta">Channel · 05</div>
    </div>
    <div class="node n6">
      <div class="node-name">Reporting</div>
      <div class="node-meta">Channel · 06</div>
    </div>
  </div>

  <div class="footer">Installed and managed · <em>invitation-only</em></div>
</body>
</html>
