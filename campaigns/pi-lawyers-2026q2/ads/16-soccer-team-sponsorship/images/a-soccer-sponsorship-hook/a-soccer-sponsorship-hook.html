<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    /* Bone Ink editorial palette */
    --bg: #f1ebde;          /* bone / off-white cream */
    --text: #15130f;        /* deep ink black */
    --muted: rgba(21,19,15,0.55);
    --strike: #b3261e;      /* crimson red */
    --accent: #b3261e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: grid;
    grid-template-rows: auto auto auto auto;
    align-content: center;
    padding: 70px 60px;
    gap: 36px;
  }
  .icp {
    text-align: center;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .wrong {
    position: relative;
    font-size: 96px;
    font-weight: 900;
    letter-spacing: -3.2px;
    line-height: 1.0;
    text-align: center;
    color: var(--text);
  }
  .wrong .killed {
    position: relative;
    display: inline-block;
    color: var(--muted);
  }
  .wrong .killed::after {
    content: "";
    position: absolute;
    top: 50%;
    left: -4%;
    width: 108%;
    height: 22px;
    background: var(--strike);
    transform: translateY(-50%) rotate(-2deg) skewX(-4deg);
    border-radius: 40% 60% 50% 60%;
    box-shadow: 3px 5px 0 rgba(179,38,30,0.25);
  }
  .arrow {
    text-align: center;
    font-size: 64px;
    line-height: 1;
    color: var(--accent);
    font-weight: 900;
  }
  .right {
    text-align: center;
    font-size: 60px;
    font-weight: 900;
    letter-spacing: -1.6px;
    line-height: 1.05;
    padding: 34px 36px;
    background: var(--text);
    color: var(--bg);
    border-radius: 20px;
  }
  .right em { font-style: normal; color: #ffb3ae; }
  .footer {
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .footer em { font-style: normal; color: var(--accent); }
</style>
</head>
<body>
  <div class="icp">PI Lawyers</div>

  <div class="wrong">Sponsoring the<br><span class="killed">soccer team</span><br>won't double<br>your firm.</div>

  <div class="arrow">↓</div>

  <div class="right"><em>Predictable inbound referrals</em> will.</div>

  <div class="footer">Exclusive · <em>Performance basis</em> · Invitation only</div>
</body>
</html>
