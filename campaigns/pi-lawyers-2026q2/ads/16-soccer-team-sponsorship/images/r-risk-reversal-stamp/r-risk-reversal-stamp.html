<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #2a0a14;
    --text: #f5ead5;
    --muted: rgba(245,234,213,0.62);
    --accent: #f59e0b;
    --seal-ink: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 48px 60px;
    text-align: center;
  }
  .headline {
    font-size: 78px;
    font-weight: 900;
    letter-spacing: -2.4px;
    line-height: 0.95;
  }
  .headline em { font-style: normal; color: var(--accent); }
  .kicker {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 6px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .stage {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .seal {
    width: 720px;
    height: 720px;
    transform: rotate(-8deg);
    filter: drop-shadow(0 18px 30px rgba(0,0,0,0.45));
  }
  .footer {
    font-size: 26px;
    font-weight: 800;
    color: var(--muted);
    line-height: 1.3;
  }
  .footer em { font-style: normal; color: var(--accent); font-weight: 900; }
  .footer .line {
    color: var(--text);
    font-weight: 900;
    font-size: 34px;
    display: block;
    margin-bottom: 8px;
    letter-spacing: -0.6px;
  }
</style>
</head>
<body>
  <div>
    <div class="kicker">The Performance Guarantee</div>
    <div class="headline">No qualified referral?<br><em>No invoice.</em></div>
  </div>

  <div class="stage">
    <svg class="seal" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="topArc" d="M 90 300 A 210 210 0 0 1 510 300" fill="none"/>
        <path id="bottomArc" d="M 90 320 A 210 210 0 0 0 510 320" fill="none"/>
      </defs>

      <!-- outer ring -->
      <circle cx="300" cy="300" r="270" fill="none" stroke="#f59e0b" stroke-width="6"/>
      <circle cx="300" cy="300" r="248" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <!-- inner ring -->
      <circle cx="300" cy="300" r="180" fill="#f59e0b"/>
      <circle cx="300" cy="300" r="168" fill="none" stroke="#2a0a14" stroke-width="3"/>

      <!-- arc text -->
      <text font-family="Inter, sans-serif" font-weight="900" font-size="28" letter-spacing="6" fill="#f59e0b">
        <textPath href="#topArc" startOffset="50%" text-anchor="middle">YOU ONLY PAY FOR REFERRALS</textPath>
      </text>
      <text font-family="Inter, sans-serif" font-weight="900" font-size="22" letter-spacing="9" fill="#f59e0b">
        <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">★  PERFORMANCE  ·  BASIS  ·  ONLY  ★</textPath>
      </text>

      <!-- center stamp text -->
      <text x="300" y="262" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="38" fill="#2a0a14" letter-spacing="-0.6">THAT MEET</text>
      <text x="300" y="312" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="38" fill="#2a0a14" letter-spacing="-0.6">YOUR</text>
      <text x="300" y="362" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="44" fill="#f5ead5" letter-spacing="2">CRITERIA</text>

      <!-- decorative dots -->
      <g fill="#f59e0b">
        <circle cx="60" cy="300" r="10"/>
        <circle cx="540" cy="300" r="10"/>
      </g>
    </svg>
  </div>

  <div class="footer">
    <span class="line">Exclusive referrals. Live in 3 days.</span>
    Invitation only · <em>3 PI firms this quarter</em>
  </div>
</body>
</html>
