<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0e3b3a;
    --text: #f2f7f4;
    --bar: #7fffd4;
    --bar-text: #0a2625;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
  }
  .bar {
    background: var(--bar);
    color: var(--bar-text);
    padding: 50px 60px;
    font-size: 50px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }
  .main {
    flex: 1;
    padding: 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
  }
  .headline {
    font-size: 132px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -3px;
  }
  .headline .accent {
    color: var(--bar);
  }
  .subhead {
    font-size: 40px;
    font-weight: 600;
    line-height: 1.3;
    margin-top: 50px;
    opacity: 0.78;
  }
</style>
</head>
<body>
  <div class="bar">Attention: PI Trial Lawyers</div>
  <div class="main">
    <div class="headline">Can your firm<br>handle <span class="accent">25+</span><br>new referral<br>cases a month?</div>
    <div class="subhead">If yes, we should talk. Performance-based, invitation-only.</div>
  </div>
</body>
</html>
