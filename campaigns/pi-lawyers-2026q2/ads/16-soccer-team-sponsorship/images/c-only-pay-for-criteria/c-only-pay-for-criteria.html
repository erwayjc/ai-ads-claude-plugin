<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #f4ede2;
    --text: #1a1a1a;
    --accent: #d6206b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    text-align: center;
  }
  .kicker {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 24px;
    opacity: 0.85;
  }
  .number {
    font-size: 600px;
    font-weight: 900;
    line-height: 0.82;
    letter-spacing: -28px;
    color: var(--accent);
  }
  .label {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.15;
    margin-top: 48px;
    letter-spacing: -1px;
    max-width: 900px;
  }
  .sub {
    font-size: 36px;
    font-weight: 600;
    line-height: 1.25;
    margin-top: 28px;
    letter-spacing: -0.5px;
    opacity: 0.8;
    max-width: 880px;
  }
</style>
</head>
<body>
  <div class="kicker">PI Firms · Performance-Based</div>
  <div class="number">$0</div>
  <div class="label">Until a referral meets<br>your criteria.</div>
  <div class="sub">Pay only for referrals that meet your criteria.<br>Performance-based, invitation-only.</div>
</body>
</html>
