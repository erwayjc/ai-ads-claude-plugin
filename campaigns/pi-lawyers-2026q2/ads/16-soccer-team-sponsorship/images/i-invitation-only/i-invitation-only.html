<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg-start: #ff2d87;
    --bg-end: #0a0a0a;
    --text: #ffffff;
    --accent: #ffd34d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(155deg, var(--bg-start) 0%, var(--bg-end) 80%);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 70px 70px 80px;
    text-align: center;
  }
  .eyebrow {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 14px 28px;
    border-radius: 4px;
  }
  .headline {
    font-size: 180px;
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -7px;
    text-transform: uppercase;
  }
  .headline .em {
    color: var(--accent);
    display: block;
    font-size: 240px;
    letter-spacing: -10px;
    margin: 6px 0;
  }
  .sub {
    font-size: 44px;
    font-weight: 800;
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: -1px;
  }
  .sub .dot {
    color: var(--accent);
    display: inline-block;
    margin: 0 14px;
  }
</style>
</head>
<body>
  <div class="eyebrow">PI Firms &mdash; By Invitation</div>
  <div class="headline">
    Only<br>
    <span class="em">3 Spots</span>
    This Month
  </div>
  <div class="sub">
    Invitation Only <span class="dot">&bull;</span> Performance Basis <span class="dot">&bull;</span> Exclusive Leads
  </div>
</body>
</html>
