<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f172a;
    --text: #ffffff;
    --accent: #f97316;
    --rule: rgba(255,255,255,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 70px;
    text-align: center;
  }
  .eyebrow {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 30px;
    color: var(--accent);
  }
  .headline {
    font-size: 78px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -2px;
    margin-bottom: 50px;
    max-width: 940px;
  }
  .funnel {
    width: 940px;
    height: 360px;
    margin-bottom: 40px;
  }
  .punchline {
    font-size: 50px;
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -1px;
    opacity: 0.9;
  }
  .punchline em {
    font-style: normal;
    color: var(--accent);
  }
</style>
</head>
<body>
  <div class="eyebrow">Your intake right now</div>
  <div class="headline">Where the leads go.</div>
  <svg class="funnel" viewBox="0 0 940 360" xmlns="http://www.w3.org/2000/svg">
    <!-- Bar 1: 100% (lead came in) - full width baseline -->
    <rect x="0" y="20" width="900" height="76" rx="10" fill="#f97316"/>
    <text x="20" y="68" font-family="Inter, sans-serif" font-size="38" font-weight="900" fill="#0f172a">LEAD COMES IN</text>
    <text x="880" y="68" text-anchor="end" font-family="Inter, sans-serif" font-size="38" font-weight="900" fill="#0f172a">100%</text>

    <!-- Bar 2: 27% reached (73% to voicemail) -->
    <rect x="0" y="120" width="243" height="76" rx="10" fill="#f97316" opacity="0.7"/>
    <text x="263" y="168" font-family="Inter, sans-serif" font-size="34" font-weight="800" fill="#ffffff">73% → VOICEMAIL</text>

    <!-- Bar 3: 16% (41% of remaining never called back -> 27*.59 = ~16%) -->
    <rect x="0" y="220" width="143" height="76" rx="10" fill="#f97316" opacity="0.45"/>
    <text x="163" y="268" font-family="Inter, sans-serif" font-size="34" font-weight="800" fill="#ffffff">41% → NEVER CALLED BACK</text>

    <!-- Bar 4: 0% signed - just an outline -->
    <rect x="0" y="320" width="40" height="30" rx="6" fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="6 4"/>
    <text x="60" y="345" font-family="Inter, sans-serif" font-size="34" font-weight="900" fill="#f97316">0% → SIGNED</text>
  </svg>
  <div class="punchline">Speed-to-lead under 5 min<br>fixes <em>all three.</em></div>
</body>
</html>
