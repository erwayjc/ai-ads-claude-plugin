<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #f4ede2;
    --text: #0a0a0a;
    --stripe: #b8001f;
    --stripe-text: #ffffff;
    --accent: #b8001f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    position: relative;
    overflow: hidden;
  }
  .stripe {
    position: absolute;
    top: 0; left: 0;
    width: 1500px;
    height: 140px;
    background: var(--stripe);
    color: var(--stripe-text);
    transform: rotate(-12deg) translate(-100px, 40px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 280px 80px 60px;
    text-align: center;
  }
  .headline {
    font-size: 116px;
    font-weight: 900;
    line-height: 0.96;
    letter-spacing: -3px;
  }
  .headline .em { color: var(--accent); }
  .sub {
    font-size: 34px;
    font-weight: 700;
    line-height: 1.3;
    margin-top: 56px;
    opacity: 0.72;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>
  <div class="stripe">For PI Firm Owners</div>
  <div class="content">
    <div class="headline">Your firm's brand<br>marketing on<br><span class="em">absolute steroids.</span></div>
    <div class="sub">The complete PI flywheel. Performance-based. Invitation only.</div>
  </div>
</body>
</html>
