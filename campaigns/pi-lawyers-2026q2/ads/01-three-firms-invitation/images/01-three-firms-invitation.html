<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>:root {
    --bg: #1a0a14;
    --text: #fff5e6;
    --bar: #ff6b35;
    --bar-text: #1a0a14;
    --accent: #ff6b35;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
  }
  .bar {
    background: var(--bar);
    color: var(--bar-text);
    padding: 46px 60px;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }
  .main {
    flex: 1;
    padding: 90px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
  }
  .headline {
    font-size: 125px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -4px;
  }
  .headline .em { color: var(--accent); }
  .subhead {
    font-size: 36px;
    font-weight: 700;
    line-height: 1.3;
    margin-top: 56px;
    opacity: 0.72;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>
  <div class="bar">Attention: PI Lawyers</div>
  <div class="main">
    <div class="headline">Can You Handle<br><span class="em">25+ Case Leads</span><br>per month?</div>
    <div class="subhead">By invitation only. Performance basis only.</div>
  </div>


</body></html>
