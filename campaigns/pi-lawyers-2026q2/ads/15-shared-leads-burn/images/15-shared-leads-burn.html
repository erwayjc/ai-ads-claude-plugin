<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #1a1a1a;
    --card: #ffffff;
    --text: #1a1a1a;
    --accent: #d92d20;
    --dim: #cfcfcf;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 70px;
  }
  .card {
    width: 100%;
    height: 100%;
    background: var(--card);
    color: var(--text);
    border-radius: 32px;
    padding: 70px 70px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top {
    display: flex;
    align-items: center;
    gap: 30px;
  }
  .stars {
    color: var(--accent);
    font-size: 56px;
    letter-spacing: 6px;
  }
  .leads-svg {
    width: 260px;
    height: 160px;
    margin: 18px auto 0;
    display: block;
  }
  .quote {
    font-size: 64px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1.5px;
  }
  .quote .em {
    color: var(--accent);
  }
  .quote .strike {
    color: #8a8a8a;
    text-decoration: line-through;
    text-decoration-thickness: 4px;
  }
  .who {
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #d92d20, #1a1a1a);
  }
  .meta {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.3;
  }
  .meta .sub { display: block; opacity: 0.55; font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <div>
      <div class="top">
        <div class="stars">★★★★★</div>
      </div>
      <svg class="leads-svg" viewBox="0 0 260 160" xmlns="http://www.w3.org/2000/svg">
        <!-- 4 stacked "lead cards" — bottom 3 desaturated, top one in accent -->
        <g>
          <rect x="48" y="68" width="170" height="86" rx="10" fill="#e5e5e5" stroke="#cfcfcf" stroke-width="2"/>
          <rect x="60" y="80" width="100" height="10" rx="3" fill="#cfcfcf"/>
          <rect x="60" y="98" width="60" height="8" rx="3" fill="#cfcfcf"/>
          <text x="60" y="138" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#cfcfcf">FIRM #4</text>
        </g>
        <g>
          <rect x="38" y="52" width="170" height="86" rx="10" fill="#eaeaea" stroke="#cfcfcf" stroke-width="2"/>
          <rect x="50" y="64" width="100" height="10" rx="3" fill="#cfcfcf"/>
          <rect x="50" y="82" width="60" height="8" rx="3" fill="#cfcfcf"/>
          <text x="50" y="122" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#bdbdbd">FIRM #3</text>
        </g>
        <g>
          <rect x="28" y="36" width="170" height="86" rx="10" fill="#f0f0f0" stroke="#bdbdbd" stroke-width="2"/>
          <rect x="40" y="48" width="100" height="10" rx="3" fill="#bdbdbd"/>
          <rect x="40" y="66" width="60" height="8" rx="3" fill="#bdbdbd"/>
          <text x="40" y="106" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#9c9c9c">FIRM #2</text>
        </g>
        <g>
          <rect x="18" y="20" width="170" height="86" rx="10" fill="#ffffff" stroke="#d92d20" stroke-width="4"/>
          <rect x="30" y="34" width="100" height="10" rx="3" fill="#d92d20"/>
          <rect x="30" y="52" width="60" height="8" rx="3" fill="#d92d20"/>
          <text x="30" y="92" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#d92d20">YOUR FIRM</text>
        </g>
      </svg>
    </div>
    <div class="quote">"Paid <span class="em">$400/lead.</span><br>Three other firms got<br>the <span class="strike">same name.</span><br><span class="em">Never again.</span>"</div>
    <div class="who">
      <div class="avatar"></div>
      <div class="meta">Managing partner, PI firm<span class="sub">Tampa, FL — anonymous for compliance</span></div>
    </div>
  </div>
</body>
</html>
