<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0a2e2e;
    --text: #e8f5f2;
    --accent: #2dd4bf;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 110px;
    text-align: center;
  }
  .dot {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--accent);
    margin-bottom: 56px;
  }
  .headline {
    font-size: 116px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -3px;
    white-space: nowrap;
  }
  .headline .em { color: var(--accent); }
  .sub {
    font-size: 36px;
    font-weight: 700;
    line-height: 1.3;
    margin-top: 56px;
    opacity: 0.75;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>
  <div class="dot"></div>
  <div class="headline">We only get paid<br>when <span class="em">you do.</span><br>Period.</div>
  <div class="sub">Performance-based PI marketing. 3 firms this month.</div>
</body>
</html>
