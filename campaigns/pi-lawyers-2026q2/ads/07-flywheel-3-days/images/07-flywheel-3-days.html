<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg-start: #0b1d3f;
    --bg-end: #1f3b6f;
    --text: #ffffff;
    --accent: #f7c948;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 90px;
    text-align: center;
  }
  .eyebrow {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 50px;
  }
  .headline {
    font-size: 116px;
    font-weight: 900;
    line-height: 0.98;
    letter-spacing: -3px;
    margin-bottom: 60px;
  }
  .stack {
    display: flex;
    flex-direction: column;
    gap: 26px;
    font-size: 56px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -1.5px;
  }
  .stack .row { padding-bottom: 22px; border-bottom: 3px solid rgba(255,255,255,0.18); }
  .stack .row:last-child { border-bottom: none; }
  .num { color: var(--accent); }
</style>
</head>
<body>
  <div class="eyebrow">The PI Case Lead Flywheel</div>
  <div class="headline">Installed in<br><span class="num" style="color: var(--accent);">3 days.</span></div>
  <div class="stack">
    <div class="row"><span class="num">1hr</span> per month of your time</div>
    <div class="row"><span class="num">100%</span> exclusive leads</div>
    <div class="row"><span class="num">0</span> shared with other firms</div>
  </div>
</body>
</html>
